<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Abdullah Shadek Fahim | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#f8f7f3;--surface:#fff;--surface2:#f2efe9;
            --border:#e6e1d9;--border2:#d5cfc6;
            --ink:#1a1714;--ink2:#4a453e;--ink3:#8a837a;
            --blue:#1d5aff;--blue-l:#e8eeff;--blue-m:#c5d3ff;
            --teal:#00897b;--teal-l:#e0f4f1;
            --amber:#b87000;--amber-l:#fef3e0;
            --rose:#c0335a;--rose-l:#fde8ef;
            --green:#2e7d32;--green-l:#e8f5e9;
            --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
            --r:14px;--r-sm:8px;
        }
        html{scroll-behavior:smooth}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh}

        /* ── NAVIGATION & DROPDOWNS ── */
        nav{position:sticky;top:0;z-index:100;background:rgba(248,247,243,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:65px}
        .nav-logo{font-family:'Fraunces',serif;font-weight:700;font-size:1.2rem;color:var(--ink);cursor:pointer}
        .nav-logo span{color:var(--blue)}
        .nav-links{display:flex;gap:1.2rem;list-style:none}
        .nav-item{position:relative;padding:1rem 0}
        .nav-item > a{color:var(--ink2);text-decoration:none;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:4px}
        .nav-item:hover > a{color:var(--blue)}
        
        .dropdown{position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);box-shadow:var(--shadow);min-width:200px;opacity:0;visibility:hidden;transform:translateY(10px);transition:all .2s;padding:0.5rem 0}
        .nav-item:hover .dropdown{opacity:1;visibility:visible;transform:translateY(0)}
        .dropdown a{display:flex;justify-content:space-between;padding:0.6rem 1rem;color:var(--ink2);text-decoration:none;font-size:.8rem;font-weight:500;transition:background .2s}
        .dropdown a:hover{background:var(--blue-l);color:var(--blue)}
        .count-tag{background:var(--border);color:var(--ink3);font-size:0.65rem;padding:1px 6px;border-radius:10px}

        /* ── HERO & GLITCH ANIMATION ── */
        .hero{max-width:1100px;margin:0 auto;padding:4rem 5vw 3rem;display:grid;grid-template-columns:auto 1fr;gap:3rem;align-items:center}
        .photo-wrapper{position:relative;width:200px;height:200px;border-radius:24px;overflow:hidden;border:4px solid var(--surface);box-shadow:var(--shadow)}
        .hero-photo{width:100%;height:100%;object-fit:cover;display:block}
        
        /* Glassy Wave Glitch */
        .photo-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            animation: wave 4s infinite;
        }
        @keyframes wave {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        .hero-name{font-family:'Fraunces',serif;font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;line-height:1.1;margin-bottom:.7rem}
        .hero-bio{font-size:1rem;color:var(--ink2);max-width:600px;margin-bottom:1.5rem}

        /* ── EDUCATION SECTION ── */
        .edu-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:1.5rem;margin-top:2rem}
        .edu-card{background:var(--surface);padding:1.5rem;border-radius:var(--r);border:1px solid var(--border)}
        .edu-year{font-size:0.75rem;color:var(--blue);font-weight:700;text-transform:uppercase}
        .edu-title{font-family:'Fraunces',serif;font-size:1.1rem;margin:0.3rem 0}
        .edu-gpa{font-weight:700;color:var(--ink2);font-size:0.9rem}

        /* ── REVIEWS ── */
        .reviews-container{display:flex;gap:1.5rem;overflow-x:auto;padding:1rem 0;scrollbar-width:none}
        .review-card{min-width:300px;background:var(--surface);padding:1.5rem;border-radius:var(--r);border:1px solid var(--border);flex-shrink:0}
        .review-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
        .review-avatar{width:40px;height:40px;border-radius:50%;background:var(--blue-l);object-fit:cover}
        .review-text{font-style:italic;font-size:0.85rem;color:var(--ink2)}
        .review-time{display:block;margin-top:0.8rem;font-size:0.7rem;color:var(--ink3)}

        /* ── PROJECTS GRID ── */
        .section{max-width:1100px;margin:0 auto;padding:3rem 5vw}
        .section-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2rem;border-bottom:1px solid var(--border);padding-bottom:1rem}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;transition:all .3s}
        .card:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
        .card-img{width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:1rem}

        .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.4rem;border-radius:var(--r-sm);font-size:.85rem;font-weight:700;text-decoration:none;transition:all .2s;cursor:pointer;border:none}
        .btn-p{background:var(--blue);color:#fff}
        .btn-fiverr{background:#1dbf73;color:#fff}
        .btn-g{background:var(--surface);color:var(--ink2);border:1px solid var(--border2)}
        .see-all{font-size:0.85rem;font-weight:700;color:var(--blue);text-decoration:none}

        @media(max-width:680px){
            .hero{grid-template-columns:1fr;text-align:center}
            .photo-wrapper{margin:0 auto}
            .nav-links{display:none} /* Simplification for mobile */
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo" onclick="goHome()">A.S.<span>FAHIM</span></div>
    <ul class="nav-links">
        <li class="nav-item">
            <a href="#">Research ▾</a>
            <div class="dropdown">
                <a href="#Thesis">Thesis <span class="count-tag" id="count-Thesis">0</span></a>
                <a href="#Journal">Journal <span class="count-tag" id="count-Journal">0</span></a>
                <a href="#Conference">Conference <span class="count-tag" id="count-Conference">0</span></a>
            </div>
        </li>
        <li class="nav-item">
            <a href="#">Projects ▾</a>
            <div class="dropdown">
                <a href="#Academic-Project">Academic Project <span class="count-tag" id="count-Academic-Project">0</span></a>
                <a href="#Freelance-Project">Freelance Project <span class="count-tag" id="count-Freelance-Project">0</span></a>
            </div>
        </li>
        <li class="nav-item">
            <a href="#">Experiences ▾</a>
            <div class="dropdown">
                <a href="#Full-Time">Full Time <span class="count-tag" id="count-Full-Time">0</span></a>
                <a href="#Volunteery">Volunteery <span class="count-tag" id="count-Volunteery">0</span></a>
            </div>
        </li>
        <li class="nav-item">
            <a href="#">More ▾</a>
            <div class="dropdown">
                <a href="#Training">Training & Certificates <span class="count-tag" id="count-Training">0</span></a>
                <a href="#Sessions">Sessions <span class="count-tag" id="count-Sessions">0</span></a>
                <a href="#Awards">Awards & Scholarships <span class="count-tag" id="count-Awards">0</span></a>
                <a href="mailto:asfahimbd@gmail.com">Contact Me</a>
            </div>
        </li>
    </ul>
</nav>

<div id="app"></div>

<footer>© 2026 Abdullah Shadek Fahim | JUST</footer>

<script>
const REPO = 'asfahimbd/abdullahfahim';
const BRANCH = 'main';

const HERO_DATA = {
    name: "Abdullah Shadek Fahim",
    tagline: "EEE Researcher · Jashore University of Science and Technology",
    bio: "Focused on Semiconductor Research (Ion Implantation in SiC/GaAs) and Machine Learning applications in Engineering. Experienced in high-end web architecture and book design. [cite: 5, 6]",
    photo: "https://avatars.githubusercontent.com/u/86173987?v=4", // CV থেকে সংগৃহীত GitHub ফটোলিঙ্ক [cite: 2]
    fiverr: "https://www.fiverr.com/abdullah_fahim" // Placeholder link
};

const EDUCATION = [
    { school: "Jashore University of Science & Technology", degree: "B.Sc. in Electrical and Electronic Engineering", year: "2020 - 2026", result: "CGPA: 3.81/4.00" },
    { school: "Ispahani Public School & College", degree: "Higher Secondary Certificate (Science)", year: "2017 - 2019", result: "GPA: 5.00/5.00" },
    { school: "Junior School Certificate", degree: "Talent Pool Scholarship", year: "2014", result: "Chittagong Board" }
];

let ALL_ITEMS = [];

async function init() {
    renderHome();
    ALL_ITEMS = await fetchAllContent();
    updateCounts();
    renderHome(); // Re-render with data
}

async function fetchAllContent() {
    try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/content/projects?ref=${BRANCH}`);
        const files = await res.json();
        const mdFiles = files.filter(f => f.name.endsWith('.md'));
        
        const data = await Promise.all(mdFiles.map(async f => {
            const raw = await fetch(f.download_url);
            const text = await raw.text();
            return parseMD(text, f.name);
        }));
        return data;
    } catch(e) { return []; }
}

function parseMD(text, filename) {
    const m = text.match(/^---\n([\s\S]*?)\n---/);
    const fm = m ? m[1] : '';
    const getValue = (key) => {
        const regex = new RegExp(`${key}:\\s*["']?([^"'\n]+)["']?`);
        const match = fm.match(regex);
        return match ? match[1] : '';
    };
    return {
        id: filename.replace('.md', ''),
        title: getValue('title'),
        category: getValue('category'), // e.g., Thesis, Freelance-Project, etc.
        image: getValue('image'),
        desc: getValue('description'),
        date: getValue('date') || '2026'
    };
}

function updateCounts() {
    const categories = ['Thesis', 'Journal', 'Conference', 'Academic-Project', 'Freelance-Project', 'Full-Time', 'Volunteery', 'Training', 'Sessions', 'Awards'];
    categories.forEach(cat => {
        const count = ALL_ITEMS.filter(i => i.category === cat).length;
        const el = document.getElementById(`count-${cat}`);
        if(el) el.innerText = count;
    });
}

function renderHome() {
    const h = HERO_DATA;
    
    let html = `
        <section class="hero">
            <div class="photo-wrapper">
                <img src="${h.photo}" class="hero-photo" alt="Abdullah Shadek Fahim">
            </div>
            <div>
                <h1 class="hero-name">${h.name}</h1>
                <p class="hero-bio">${h.bio}</p>
                <div style="display:flex;gap:10px;flex-wrap:wrap">
                    <a href="mailto:asfahimbd@gmail.com" class="btn btn-p">✉ Contact Me</a>
                    <a href="${h.fiverr}" target="_blank" class="btn btn-fiverr">Hire me (Fiverr)</a>
                    <a href="https://github.com/abdullahFahim19" target="_blank" class="btn btn-g">GitHub</a>
                </div>
            </div>
        </section>

        <section class="section" style="background:var(--surface2)">
            <h2 class="section-title">Education</h2>
            <div class="edu-grid">
                ${EDUCATION.map(e => `
                    <div class="edu-card">
                        <span class="edu-year">${e.year}</span>
                        <h3 class="edu-title">${e.degree}</h3>
                        <p style="font-size:0.85rem;color:var(--ink3)">${e.school}</p>
                        <p class="edu-gpa">${e.result}</p>
                    </div>
                `).join('')}
            </div>
        </section>
    `;

    // Category Sections (Latest 3)
    const sections = [
        { label: "Latest Research", cat: "Thesis" },
        { label: "Freelance Projects", cat: "Freelance-Project" },
        { label: "Experience", cat: "Full-Time" }
    ];

    sections.forEach(s => {
        const items = ALL_ITEMS.filter(i => i.category === s.cat).slice(0, 3);
        if(items.length > 0) {
            html += `
                <section class="section" id="${s.cat}">
                    <div class="section-header">
                        <h2 style="font-family:Fraunces;font-size:1.6rem">${s.label}</h2>
                        <a href="#all-${s.cat}" class="see-all">See All →</a>
                    </div>
                    <div class="grid">
                        ${items.map(i => `
                            <div class="card">
                                <img src="${i.image || 'https://via.placeholder.com/300x160'}" class="card-img">
                                <h3>${i.title}</h3>
                                <p style="font-size:0.8rem;color:var(--ink2)">${i.desc}</p>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;
        }
    });

    // Mock Reviews Section
    html += `
        <section class="section">
            <h2 class="section-title">Client Reviews</h2>
            <div class="reviews-container">
                <div class="review-card">
                    <div class="review-header">
                        <img src="https://ui-avatars.com/api/?name=Michael+Ricciardi" class="review-avatar">
                        <div>
                            <div style="font-weight:700;font-size:0.85rem">Michael G. Ricciardi</div>
                            <div style="color:var(--amber)">★★★★★</div>
                        </div>
                    </div>
                    <p class="review-text">"Exceptional work on my book project. Fahim's technical knowledge and design sense are top-notch." [cite: 94, 98]</p>
                    <span class="review-time">2 months ago</span>
                </div>
                <div class="review-card">
                    <div class="review-header">
                        <img src="https://ui-avatars.com/api/?name=Global+Client" class="review-avatar">
                        <div>
                            <div style="font-weight:700;font-size:0.85rem">Fiverr Client</div>
                            <div style="color:var(--amber)">★★★★★</div>
                        </div>
                    </div>
                    <p class="review-text">"Completed over 350 projects with 5-star ratings. Truly a professional developer." [cite: 40]</p>
                    <span class="review-time">1 week ago</span>
                </div>
            </div>
        </section>
    `;

    document.getElementById('app').innerHTML = html;
}

function goHome() {
    window.location.hash = '';
    renderHome();
}

init();
</script>
</body>
</html>
