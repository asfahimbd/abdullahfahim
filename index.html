<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Abdullah Shadek Fahim | Researcher & Professional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#f8f7f3;--surface:#fff;--surface2:#f2efe9;
            --border:#e6e1d9;--border2:#d5cfc6;
            --ink:#1a1714;--ink2:#4a453e;--ink3:#8a837a;
            --blue:#1d5aff;--blue-l:#e8eeff;--blue-m:#c5d3ff;
            --teal:#00897b;--teal-l:#e0f4f1;
            --amber:#b87000;--amber-l:#fef3e0;
            --rose:#c0335a;--rose-l:#fde8ef;
            --green:#2e7d32;--green-l:#e8f5e9;
            --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
            --shadow-lg:0 4px 6px rgba(0,0,0,.05),0 16px 48px rgba(0,0,0,.12);
            --r:14px;--r-sm:8px;
        }
        html{scroll-behavior:smooth}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh}

        /* ── NAV ── */
        nav{position:sticky;top:0;z-index:80;background:rgba(248,247,243,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:56px}
        .nav-logo{font-family:'Fraunces',serif;font-weight:700;font-size:1.1rem;color:var(--ink);cursor:pointer}
        .nav-logo span{color:var(--blue)}
        .nav-links{display:flex;gap:1.5rem;list-style:none}
        .nav-links a{color:var(--ink3);text-decoration:none;font-size:.83rem;font-weight:500;transition:color .2s}
        .nav-links a:hover{color:var(--blue)}

        /* ── HERO ── */
        .hero{max-width:1100px;margin:0 auto;padding:4rem 5vw 3rem;display:grid;grid-template-columns:auto 1fr;gap:3rem;align-items:center}
        .hero-photo{width:180px;height:180px;border-radius:24px;object-fit:cover;border:4px solid var(--surface);box-shadow:var(--shadow-lg);transform:rotate(-2deg)}
        .hero-name{font-family:'Fraunces',serif;font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:.7rem}
        .hero-name em{font-style:italic;color:var(--blue)}
        .hero-bio{font-size:1rem;color:var(--ink2);max-width:600px;line-height:1.75;margin-bottom:1.5rem}

        /* ── SECTIONS ── */
        .section{max-width:1100px;margin:0 auto;padding:2.5rem 5vw}
        .section-title{font-family:'Fraunces',serif;font-size:1.8rem;margin-bottom:1.5rem;padding-bottom:.7rem;border-bottom:2px solid var(--border)}

        /* ── CARDS ── */
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;position:relative;overflow:hidden}
        .card:hover{box-shadow:var(--shadow-lg);transform:translateY(-4px);border-color:var(--blue-m)}
        .card-img{width:100%;height:150px;object-fit:cover;border-radius:8px;margin-bottom:1rem;background:var(--surface2)}
        .card h3{font-size:1rem;margin-bottom:.4rem}
        .card-meta{font-size:.75rem;color:var(--ink3);margin-bottom:.5rem}
        .card p{font-size:.83rem;color:var(--ink2);flex:1}
        .card-cta{margin-top:.8rem;color:var(--blue);font-weight:700;font-size:.8rem}

        /* ── CATEGORY BADGE ── */
        .badge{display:inline-block;padding:.18rem .55rem;border-radius:999px;font-size:.68rem;font-weight:700;margin-bottom:.5rem}
        .badge-Fiverr{background:var(--teal-l);color:var(--teal)}
        .badge-Research{background:var(--blue-l);color:var(--blue)}
        .badge-Session{background:var(--amber-l);color:var(--amber)}
        .badge-Award{background:var(--rose-l);color:var(--rose)}

        /* ── DETAIL PAGE ── */
        .detail-page{max-width:860px;margin:0 auto;padding:2rem 5vw 4rem}
        .detail-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2.5rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
        .detail-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.8rem;margin-bottom:1.2rem}
        .detail-title{font-family:'Fraunces',serif;font-size:2.2rem;margin-bottom:.5rem}
        .detail-body{line-height:1.8;color:var(--ink2)}
        .detail-body h1,.detail-body h2,.detail-body h3{font-family:'Fraunces',serif;margin:1.2rem 0 .6rem}
        .detail-body p{margin-bottom:.8rem}
        .detail-body ul,.detail-body ol{margin-left:1.4rem;margin-bottom:.8rem}
        .detail-body strong{color:var(--ink)}

        /* ── SKELETON LOADER ── */
        .skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .skel-card{height:280px}

        /* ── EMPTY STATE ── */
        .empty{text-align:center;padding:3rem;color:var(--ink3);background:var(--surface);border:1px dashed var(--border2);border-radius:var(--r)}

        /* ── BUTTONS ── */
        .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.2rem;border-radius:var(--r-sm);font-size:.85rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;transition:all .2s}
        .btn-p{background:var(--blue);color:#fff}
        .btn-g{background:var(--surface);color:var(--ink2);border:1px solid var(--border2)}
        .btn:hover{opacity:.88;transform:translateY(-1px)}

        /* ── FILTER TABS ── */
        .filter-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
        .ftab{padding:.35rem .9rem;border-radius:999px;font-size:.78rem;font-weight:600;border:1px solid var(--border2);background:var(--surface);color:var(--ink3);cursor:pointer;transition:all .18s}
        .ftab.active{background:var(--blue);color:#fff;border-color:var(--blue)}

        footer{text-align:center;padding:3rem;color:var(--ink3);border-top:1px solid var(--border);margin-top:3rem}
        @media(max-width:680px){.hero{grid-template-columns:1fr;text-align:center}.hero-photo{margin:0 auto}}
    </style>
</head>
<body>

<nav>
    <div class="nav-logo" onclick="goHome()">A.S.<span>FAHIM</span></div>
    <ul class="nav-links">
        <li><a href="javascript:void(0)" onclick="scrollTo('#projects')">Projects</a></li>
        <li><a href="mailto:asfahimbd@gmail.com">Contact</a></li>
        <li><a href="/admin/" target="_blank">⚙ Admin</a></li>
    </ul>
</nav>

<div id="app"></div>

<footer>© 2026 Abdullah Shadek Fahim | Jashore University of Science and Technology</footer>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIG — শুধু এখানে repo name পরিবর্তন করলেই হবে
═══════════════════════════════════════════════════════ */
const REPO   = 'asfahimbd/abdullahfahim';   // GitHub username/repo
const BRANCH = 'main';
const CONTENT_PATH = 'content/projects';

/* Hero info — চাইলে এটাও config.yml এ নিতে পারো */
const HERO = {
    name: "Abdullah Shadek Fahim",
    tagline: "EEE Engineer · Level 2 Fiverr Seller",
    bio: "Specializing in Semiconductor Research (Ion Implantation) and Full-stack Web Development. Recently completed undergraduate studies at JUST with a passion for Machine Learning in Physics.",
    photo: "https://i.imgur.com/placeholder.png", // Replace with your Imgur/GitHub photo link
    email: "asfahimbd@gmail.com",
    github: "https://github.com/abdullahFahim19",
    linkedin: "https://linkedin.com/in/abdullah-fahim7640"
};

/* ═══════════════════════════════════════════════════════
   DATA LAYER — GitHub API থেকে markdown files পড়া
═══════════════════════════════════════════════════════ */
let ALL_PROJECTS = [];

async function fetchProjects() {
    try {
        /* Step 1: content/projects/ ফোল্ডারের file list আনো */
        const listRes = await fetch(
            `https://api.github.com/repos/${REPO}/contents/${CONTENT_PATH}?ref=${BRANCH}`,
            { headers: { 'Accept': 'application/vnd.github+json' } }
        );

        if (!listRes.ok) {
            console.warn('GitHub API error:', listRes.status, await listRes.text());
            return [];
        }

        const files = await listRes.json();
        const mdFiles = files.filter(f => f.name.endsWith('.md'));

        /* Step 2: প্রতিটা file এর content পড়ো (download_url সরাসরি raw) */
        const projects = await Promise.all(
            mdFiles.map(async (file) => {
                try {
                    const raw = await fetch(file.download_url);
                    const text = await raw.text();
                    return parseMarkdownFile(text, file.name);
                } catch(e) {
                    console.error('Error reading file:', file.name, e);
                    return null;
                }
            })
        );

        return projects.filter(Boolean);

    } catch(e) {
        console.error('fetchProjects failed:', e);
        return [];
    }
}

/* ═══════════════════════════════════════════════════════
   MARKDOWN PARSER — YAML frontmatter + body extract
═══════════════════════════════════════════════════════ */
function parseMarkdownFile(text, filename) {
    /* frontmatter --- ... --- */
    const fmMatch = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
    if (!fmMatch) return null;

    const fm   = fmMatch[1];
    const body = fmMatch[2].trim();

    /* Simple key: value parser (handles quoted and unquoted) */
    function get(key) {
        const m = fm.match(new RegExp(`^${key}:\\s*["']?([^"'\\n]+?)["']?\\s*$`, 'm'));
        return m ? m[1].trim() : '';
    }

    /* Image: Netlify CMS saves it as /assets/images/foo.jpg (public_folder) */
    let image = get('image');
    /* If it's a relative path, prefix with repo raw URL so it works everywhere */
    if (image && image.startsWith('/assets/')) {
        image = `https://raw.githubusercontent.com/${REPO}/${BRANCH}${image}`;
    }

    return {
        id:          filename.replace('.md', ''),
        title:       get('title')       || 'Untitled',
        category:    get('category')    || 'Fiverr',
        image:       image              || '',
        description: get('description') || '',
        link:        get('link')        || '',
        body:        body
    };
}

/* ═══════════════════════════════════════════════════════
   SIMPLE MARKDOWN → HTML (body render করার জন্য)
═══════════════════════════════════════════════════════ */
function md2html(md) {
    if (!md) return '';
    return md
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
        .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,   '<em>$1</em>')
        .replace(/`(.+?)`/g,     '<code>$1</code>')
        .replace(/^\- (.+)$/gm,  '<li>$1</li>')
        .replace(/(<li>[\s\S]+?<\/li>)/g, '<ul>$1</ul>')
        .replace(/\n\n/g,        '</p><p>')
        .replace(/^(?!<[hulo])/m,'<p>')
        + '</p>';
}

/* ═══════════════════════════════════════════════════════
   ROUTING
═══════════════════════════════════════════════════════ */
async function route() {
    const hash = window.location.hash.replace('#', '');
    if (!hash || hash === 'home') {
        await renderHome();
    } else if (hash.startsWith('view-')) {
        const id = hash.replace('view-', '');
        renderDetail(id);
    }
}

window.addEventListener('hashchange', route);
window.addEventListener('load', async () => {
    /* First render with skeleton, then load data */
    renderHome(true); // skeleton mode
    ALL_PROJECTS = await fetchProjects();
    renderHome(false);
    /* If URL already has a detail hash, render it after data loads */
    if (window.location.hash.startsWith('#view-')) {
        renderDetail(window.location.hash.replace('#view-', ''));
    }
});

/* ═══════════════════════════════════════════════════════
   RENDER: HOME
═══════════════════════════════════════════════════════ */
let activeFilter = 'All';

async function renderHome(loading = false) {
    const h = HERO;
    const categories = ['All', ...new Set(ALL_PROJECTS.map(p => p.category))];

    const filtered = activeFilter === 'All'
        ? ALL_PROJECTS
        : ALL_PROJECTS.filter(p => p.category === activeFilter);

    document.getElementById('app').innerHTML = `
        <!-- HERO -->
        <section class="hero">
            <img src="${h.photo}" class="hero-photo" alt="Profile Photo"
                 onerror="this.src='https://via.placeholder.com/180'">
            <div>
                <div style="color:var(--blue);font-weight:700;font-size:.8rem;text-transform:uppercase;margin-bottom:.5rem">
                    EEE · JUST · Fiverr Level 2
                </div>
                <h1 class="hero-name">${h.name}</h1>
                <p style="color:var(--ink3);font-size:.9rem;margin-bottom:.5rem">${h.tagline}</p>
                <p class="hero-bio">${h.bio}</p>
                <div style="display:flex;gap:1rem;flex-wrap:wrap">
                    <a href="mailto:${h.email}" class="btn btn-p">✉ Contact Me</a>
                    <a href="${h.linkedin}" target="_blank" class="btn btn-g">LinkedIn ↗</a>
                    <a href="${h.github}" target="_blank" class="btn btn-g">GitHub ↗</a>
                </div>
            </div>
        </section>

        <!-- PROJECTS -->
        <section class="section" id="projects">
            <h2 class="section-title">Portfolio</h2>

            ${loading ? '' : `
            <div class="filter-tabs">
                ${categories.map(cat => `
                    <button class="ftab ${activeFilter===cat?'active':''}"
                            onclick="setFilter('${cat}')">${cat}</button>
                `).join('')}
            </div>`}

            <div class="grid" id="projects-grid">
                ${loading
                    ? Array(3).fill('<div class="card skeleton skel-card"></div>').join('')
                    : filtered.length === 0
                        ? `<div class="empty" style="grid-column:1/-1">
                               <div style="font-size:2rem;margin-bottom:.5rem">📂</div>
                               <p>No projects found. <a href="/admin/" style="color:var(--blue)">Add via Admin →</a></p>
                           </div>`
                        : filtered.map(p => `
                            <div class="card" onclick="location.hash='view-${p.id}'">
                                ${p.image
                                    ? `<img src="${p.image}" class="card-img" alt="${p.title}"
                                             onerror="this.style.display='none'">`
                                    : `<div class="card-img" style="display:flex;align-items:center;justify-content:center;color:var(--ink3)">No Image</div>`
                                }
                                <span class="badge badge-${p.category}">${p.category}</span>
                                <h3>${p.title}</h3>
                                <p>${p.description}</p>
                                <div class="card-cta">Learn More →</div>
                            </div>
                        `).join('')
                }
            </div>
        </section>
    `;
}

function setFilter(cat) {
    activeFilter = cat;
    renderHome(false);
}

function scrollTo(sel) {
    document.querySelector(sel)?.scrollIntoView({behavior:'smooth'});
}

/* ═══════════════════════════════════════════════════════
   RENDER: DETAIL PAGE
═══════════════════════════════════════════════════════ */
function renderDetail(id) {
    const item = ALL_PROJECTS.find(p => p.id === id);
    if (!item) { goHome(); return; }

    document.getElementById('app').innerHTML = `
        <div class="detail-page">
            <button onclick="goHome()" class="btn btn-g" style="margin-bottom:2rem">← Back</button>

            <div class="detail-hero">
                ${item.image ? `<img src="${item.image}" style="width:100%;max-height:360px;object-fit:cover;border-radius:10px;margin-bottom:1.5rem">` : ''}
                <span class="badge badge-${item.category}">${item.category}</span>
                <h1 class="detail-title">${item.title}</h1>
                <p style="color:var(--ink2);margin-top:.5rem">${item.description}</p>
                ${item.link ? `<a href="${item.link}" target="_blank" class="btn btn-p" style="margin-top:1rem">View Project ↗</a>` : ''}
            </div>

            ${item.body ? `
            <div class="detail-section">
                <h3 style="margin-bottom:1rem">Details</h3>
                <div class="detail-body">${md2html(item.body)}</div>
            </div>
            ` : ''}
        </div>
    `;
    window.scrollTo(0, 0);
}

function goHome() {
    window.location.hash = '';
    activeFilter = 'All';
    renderHome(false);
}
</script>
</body>
</html>
