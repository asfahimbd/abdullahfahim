<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Abdullah Shadek Fahim | EEE Researcher & Professional</title>

<link rel="apple-touch-icon-precomposed" href="https://avatars.githubusercontent.com/u/86173987?v=4"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f3;--surface:#fff;--surface2:#f2efe9;
  --border:#e6e1d9;--border2:#d5cfc6;
  --ink:#1a1714;--ink2:#4a453e;--ink3:#8a837a;
  --blue:#1d5aff;--blue-l:#e8eeff;--blue-m:#c5d3ff;
  --teal:#00897b;--teal-l:#e0f4f1;--teal-d:#006b5f;
  --amber:#b87000;--amber-l:#fef3e0;
  --rose:#c0335a;--rose-l:#fde8ef;
  --purple:#6c35c9;--purple-l:#f0eaff;
  --green:#2e7d32;--green-l:#e8f5e9;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 4px 6px rgba(0,0,0,.05),0 16px 48px rgba(0,0,0,.14);
  --r:14px;--r-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh;overflow-x:hidden}

/* ════ NAV ════ */
nav{position:sticky;top:0;z-index:200;background:rgba(248,247,243,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:58px;gap:.8rem}
.nav-logo{display:flex;align-items:center;gap:.5rem;font-family:'Fraunces',serif;font-weight:700;font-size:1.05rem;color:var(--ink);cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav-logo span{color:var(--blue)}
.nav-photo-wrap{position:relative;width:30px;height:30px;border-radius:8px;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 2px var(--blue-m)}
.nav-photo{width:100%;height:100%;object-fit:cover;display:block}
.nav-photo-wrap::after{content:'';position:absolute;top:-20%;left:-80%;width:52%;height:140%;background:linear-gradient(105deg,transparent 28%,rgba(255,255,255,.08) 44%,rgba(255,255,255,.48) 50%,rgba(255,255,255,.08) 56%,transparent 70%);transform:skewX(-12deg);animation:glassWave 4s cubic-bezier(.45,0,.55,1) infinite;pointer-events:none}
.nav-links{display:flex;gap:0;list-style:none;align-items:center;flex:1;justify-content:center}
.nav-item{position:relative}
.nav-item>a{display:flex;align-items:center;gap:.22rem;color:var(--ink3);text-decoration:none;font-size:.78rem;font-weight:500;padding:.42rem .52rem;border-radius:6px;transition:all .15s;white-space:nowrap;cursor:pointer}
.nav-item>a:hover,.nav-item:hover>a{color:var(--blue);background:var(--blue-l)}
.nav-arrow{font-size:.48rem;opacity:.45;transition:transform .15s}
.nav-item:hover .nav-arrow{transform:rotate(180deg)}
.nav-cnt{background:var(--blue);color:#fff;border-radius:999px;padding:.03rem .3rem;font-size:.55rem;font-weight:700;min-width:15px;text-align:center;display:inline-block}
.dropdown{display:none;position:absolute;top:calc(100% + 7px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;min-width:192px;box-shadow:var(--shadow-lg);padding:.28rem;z-index:300;animation:dropIn .14s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.nav-item:hover .dropdown{display:block}
.dropdown a{display:flex;align-items:center;justify-content:space-between;padding:.4rem .64rem;border-radius:7px;color:var(--ink2);text-decoration:none;font-size:.75rem;font-weight:500;transition:all .12s;cursor:pointer}
.dropdown a:hover{background:var(--blue-l);color:var(--blue)}
.dd-cnt{background:var(--blue-l);color:var(--blue);border-radius:999px;padding:.03rem .35rem;font-size:.6rem;font-weight:700}
.dropdown-div{height:1px;background:var(--border);margin:.25rem .25rem}
.nav-hire{font-size:.73rem;font-weight:700;padding:.33rem .75rem;border-radius:7px;border:none;background:var(--teal);color:#fff;cursor:pointer;transition:all .17s;text-decoration:none;white-space:nowrap;flex-shrink:0}
.nav-hire:hover{background:var(--teal-d)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;flex-shrink:0}
.hamburger span{display:block;width:22px;height:2px;background:var(--ink);border-radius:2px}

/* ════ DRAWER ════ */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;backdrop-filter:blur(3px)}
.drawer-overlay.open{display:block}
.side-drawer{position:fixed;top:0;right:-290px;width:275px;height:100vh;background:var(--surface);z-index:401;box-shadow:var(--shadow-lg);transition:right .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.side-drawer.open{right:0}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.1rem;border-bottom:1px solid var(--border)}
.drawer-head-logo{display:flex;align-items:center;gap:.45rem;font-family:'Fraunces',serif;font-weight:700;font-size:1rem}
.drawer-nav-photo-wrap{position:relative;width:28px;height:28px;border-radius:7px;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 2px var(--blue-m)}
.drawer-nav-photo-wrap::after{content:'';position:absolute;top:-20%;left:-80%;width:52%;height:140%;background:linear-gradient(105deg,transparent 28%,rgba(255,255,255,.08) 44%,rgba(255,255,255,.48) 50%,rgba(255,255,255,.08) 56%,transparent 70%);transform:skewX(-12deg);animation:glassWave 4s cubic-bezier(.45,0,.55,1) infinite;pointer-events:none}
.drawer-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--ink3)}
.drawer-body{padding:.4rem .5rem}
.dg-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:.54rem .74rem;border-radius:8px;background:none;border:none;font-family:inherit;font-size:.81rem;font-weight:600;color:var(--ink);cursor:pointer;transition:all .13s;text-align:left}
.dg-btn:hover{background:var(--surface2)}
.dg-right{display:flex;align-items:center;gap:.35rem;font-size:.65rem}
.drawer-sub{padding:0 .4rem .2rem 1.2rem;display:none}
.drawer-sub.open{display:block}
.drawer-sub a{display:flex;align-items:center;justify-content:space-between;padding:.36rem .52rem;border-radius:6px;font-size:.77rem;color:var(--ink2);text-decoration:none;cursor:pointer;transition:all .12s}
.drawer-sub a:hover{background:var(--blue-l);color:var(--blue)}
.drawer-divider{height:1px;background:var(--border);margin:.4rem 0}
.drawer-direct{display:flex;align-items:center;justify-content:space-between;padding:.54rem .74rem;border-radius:8px;cursor:pointer;font-size:.81rem;font-weight:500;color:var(--ink2);transition:all .12s}
.drawer-direct:hover{background:var(--blue-l);color:var(--blue)}
.drawer-hire{display:block;margin:.8rem .5rem .25rem;padding:.65rem;border-radius:8px;background:var(--teal);color:#fff;text-align:center;font-weight:700;font-size:.82rem;text-decoration:none}

/* ════ HERO ════ */
.hero{max-width:1100px;margin:0 auto;padding:3rem 5vw 1rem}
.hero-bg{background:linear-gradient(135deg,rgba(29,90,255,.04) 0%,transparent 60%);position:relative}
.hero-bio-section{max-width:1100px;margin:0 auto;padding:0 5vw 2rem}
.hero-inner{display:grid;grid-template-columns:auto 1fr;gap:2.8rem;align-items:flex-start;margin-bottom:1.4rem;width:100%}
.photo-wrap{position:relative;display:inline-block;border-radius:24px;box-shadow:var(--shadow-lg);overflow:hidden;flex-shrink:0}
.hero-photo{width:170px;height:170px;border-radius:24px;object-fit:cover;display:block;border:4px solid var(--surface)}
.photo-wrap::after{content:'';position:absolute;top:-20%;left:-80%;width:52%;height:140%;background:linear-gradient(105deg,transparent 28%,rgba(255,255,255,.07) 44%,rgba(255,255,255,.44) 50%,rgba(255,255,255,.07) 56%,transparent 70%);transform:skewX(-12deg);animation:glassWave 4s cubic-bezier(.45,0,.55,1) infinite;pointer-events:none}
@keyframes glassWave{0%{left:-80%}55%,100%{left:130%}}
.photo-wrap::before{content:'';position:absolute;inset:-1px;border-radius:26px;background:linear-gradient(135deg,rgba(29,90,255,.28),rgba(0,137,123,.18),transparent 60%);z-index:-1}
.hero-eyebrow{color:var(--blue);font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.38rem}
.hero-name{font-family:'Fraunces',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:.38rem}
.hero-sub{font-size:.82rem;color:var(--ink3);margin-bottom:.6rem;font-weight:500}
/* Icon buttons row */
.hero-icon-btns{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.0rem}
.icon-btn{
  display:inline-flex;align-items:center;gap:.38rem;
  padding:.42rem .85rem;border-radius:var(--r-sm);font-size:.76rem;font-weight:600;
  text-decoration:none;cursor:pointer;border:1px solid var(--border2);
  background:var(--surface);color:var(--ink2);transition:all .18s;
}
.icon-btn:hover{border-color:var(--blue);color:var(--blue);transform:translateY(-1px);box-shadow:var(--shadow)}
.icon-btn svg,.icon-btn img{width:15px;height:15px;flex-shrink:0}
/* Full-width bio */
.hero-bio-full{
  font-size:.91rem;color:var(--ink2);line-height:1.85;
  text-align:justify;text-justify:inter-word;
  display:block;width:100%;
}

/* ════ SECTIONS ════ */
.section{max-width:1100px;margin:0 auto;padding:2rem 5vw}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;gap:.5rem}
.section-title{font-family:'Fraunces',serif;font-size:1.45rem}
.divider{max-width:1100px;margin:0 auto;padding:0 5vw}
.divider hr{border:none;border-top:1px solid var(--border)}

/* ════ EDUCATION ════ */
.edu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:.9rem}
.edu-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.15rem;display:flex;gap:.8rem;align-items:flex-start;transition:all .19s;cursor:pointer;box-shadow:var(--shadow)}
.edu-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:var(--blue-m)}
.edu-card:hover .edu-arr{opacity:1;transform:translateX(3px)}
.edu-icon{font-size:1.3rem;width:44px;height:44px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:1px solid var(--border)}
.edu-level{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:.1rem}
.edu-inst{font-size:.84rem;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:.16rem}
.edu-degree{font-size:.72rem;color:var(--ink2);margin-bottom:.38rem}
.edu-meta{display:flex;gap:.36rem;flex-wrap:wrap}
.edu-pill{padding:.12rem .44rem;border-radius:999px;font-size:.62rem;font-weight:600;background:var(--surface2);color:var(--ink3);border:1px solid var(--border)}
.edu-arr{color:var(--blue);font-size:.68rem;opacity:0;transition:all .19s;align-self:center;flex-shrink:0;margin-left:auto}

/* ════ EXPERIENCE CARDS ════ */
.exp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.1rem}
.exp-card-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .21s;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.exp-card-wrap:hover{box-shadow:var(--shadow-lg);transform:translateY(-4px);border-color:var(--blue-m)}
.exp-card-wrap.is-current{border-color:var(--teal);box-shadow:0 2px 0 var(--teal)}
.exp-card-logo{width:100%;height:130px;display:flex;align-items:center;justify-content:center;background:var(--surface2);padding:1rem}
.exp-card-logo img{max-width:100%;max-height:100%;object-fit:contain;border-radius:4px}
.exp-card-body{padding:1rem 1.1rem;flex:1;display:flex;flex-direction:column}
.exp-org-name{font-size:.83rem;font-weight:700;color:var(--ink);margin-bottom:.22rem}
.exp-location{font-size:.68rem;color:var(--ink3);margin-bottom:.48rem}
.exp-role-row{display:flex;align-items:center;gap:.42rem;margin-bottom:.18rem;flex-wrap:wrap}
.exp-role-title{font-size:.88rem;font-weight:700;color:var(--ink)}
.exp-role-date{font-size:.67rem;color:var(--ink3);margin-bottom:.35rem}
.exp-type{display:inline-block;padding:.1rem .42rem;border-radius:4px;font-size:.62rem;font-weight:600;flex-shrink:0}
.exp-type.fulltime{background:var(--blue-l);color:var(--blue)}
.exp-type.voluntary{background:var(--teal-l);color:var(--teal)}
.exp-type.internship,.exp-type.parttime{background:var(--amber-l);color:var(--amber)}
.exp-type.research{background:var(--purple-l);color:var(--purple)}
.exp-role-divider{height:1px;background:var(--border);margin:.4rem 0}
.exp-cta{margin-top:auto;padding-top:.6rem;color:var(--blue);font-weight:700;font-size:.76rem}

/* ════ CARDS / GRID ════ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(278px,1fr));gap:1rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.15rem;cursor:pointer;transition:all .21s;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow)}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-4px);border-color:var(--blue-m)}
.card-img{width:100%;height:125px;object-fit:cover;border-radius:8px;margin-bottom:.75rem;background:var(--surface2);display:block}
.card h3{font-size:.88rem;font-weight:700;margin-bottom:.3rem;line-height:1.35}
.card p{font-size:.75rem;color:var(--ink2);flex:1;line-height:1.6}
.card-cta{margin-top:.65rem;color:var(--blue);font-weight:700;font-size:.73rem}

/* Pinned badge */
.badge-pinned{background:#fff3e0;color:#e65100;border:1px solid #ffccbc}

/* Badges */
.badge{display:inline-block;padding:.13rem .46rem;border-radius:999px;font-size:.61rem;font-weight:700;margin-bottom:.38rem}
.badge-Thesis,.badge-UndergraduateThesis,.badge-Journal,.badge-Conference{background:var(--blue-l);color:var(--blue)}
.badge-AcademicProject,.badge-FreelanceProject{background:var(--teal-l);color:var(--teal)}
.badge-FullTime,.badge-Voluntary{background:var(--amber-l);color:var(--amber)}
.badge-Certificate,.badge-Session,.badge-Award,.badge-Training,.badge-FieldWork{background:var(--rose-l);color:var(--rose)}
.badge-dynamic{background:var(--purple-l);color:var(--purple)}

.see-all-row{display:flex;justify-content:center;margin-top:.9rem}
.see-all-btn{padding:.44rem 1.55rem;border-radius:999px;border:1.5px solid var(--blue-m);background:var(--blue-l);color:var(--blue);font-size:.74rem;font-weight:700;cursor:pointer;transition:all .19s}
.see-all-btn:hover{background:var(--blue);color:#fff}
.see-all-link{color:var(--blue);font-size:.74rem;font-weight:700;cursor:pointer;padding:.24rem .62rem;border-radius:6px;transition:all .14s;white-space:nowrap}
.see-all-link:hover{background:var(--blue-l)}

/* ════ SKILLS ════ */
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.2rem}
.skill-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.skill-group-header{padding:.85rem 1.1rem;border-bottom:1px solid var(--border);font-size:.82rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:.5rem}
.skill-group-body{padding:.75rem;display:flex;flex-wrap:wrap;gap:.5rem}
.skill-chip{
  position:relative;display:inline-flex;align-items:center;gap:.38rem;
  padding:.3rem .65rem;border-radius:8px;font-size:.72rem;font-weight:600;
  background:var(--surface2);color:var(--ink2);border:1px solid var(--border);
  transition:all .18s;
}
.skill-chip.has-info{cursor:pointer}
.skill-chip.has-info:hover{background:var(--blue-l);border-color:var(--blue-m);color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow)}
.skill-chip img{width:16px;height:16px;object-fit:contain;border-radius:3px}

/* Skill tooltip/popup */
.skill-popup{
  display:none;position:fixed;
  background:var(--ink);color:#fff;border-radius:12px;padding:.85rem;
  width:220px;z-index:500;box-shadow:var(--shadow-lg);
  pointer-events:none;
}
.skill-popup::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--ink)}
.skill-chip.has-info:hover .skill-popup{display:block}
.skill-popup img{width:100%;height:85px;object-fit:cover;border-radius:7px;margin-bottom:.5rem;display:block}
.skill-popup-name{font-size:.78rem;font-weight:700;margin-bottom:.28rem}
.skill-popup-desc{font-size:.7rem;opacity:.88;line-height:1.55}

/* ════ REVIEWS ════ */
.reviews-track{display:flex;gap:1rem;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;padding:0 5vw .5rem;scroll-padding-left:5vw}
.reviews-track::-webkit-scrollbar{display:none}
.review-card{scroll-snap-align:start;flex:0 0 292px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.15rem;border-left:4px solid var(--amber);transition:box-shadow .19s;box-shadow:var(--shadow)}
.review-card:hover{box-shadow:var(--shadow-lg)}
.review-top{display:flex;align-items:center;gap:.62rem;margin-bottom:.75rem}
.review-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid var(--amber-l);background:var(--surface2);flex-shrink:0}
.review-name{font-weight:700;font-size:.81rem;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
.review-flag{font-size:.75rem;color:var(--ink3);display:inline-flex;align-items:center;gap:.2rem;font-weight:400}
.review-country{font-size:.68rem}
.review-platform{font-size:.64rem;color:var(--ink3)}
.review-stars{font-size:.84rem;margin-bottom:.48rem;letter-spacing:.04em;display:flex;align-items:center;gap:.3rem}
.star-score{font-size:.75rem;font-weight:700;color:var(--amber)}
.review-text{font-size:.77rem;color:var(--ink2);line-height:1.65;font-style:italic}
.review-time{font-size:.64rem;color:var(--ink3);margin-top:.48rem}
.slider-controls{display:flex;align-items:center;gap:.5rem;justify-content:center;margin-top:.7rem}
.slider-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;font-size:.92rem;color:var(--ink2);display:flex;align-items:center;justify-content:center;transition:all .16s}
.slider-btn:hover{border-color:var(--blue);color:var(--blue)}
.slider-dots{display:flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:all .19s;cursor:pointer}
.dot.active{background:var(--amber);width:15px;border-radius:4px}

/* ════ MODAL ════ */
.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(26,23,20,.55);backdrop-filter:blur(6px);justify-content:center;align-items:flex-start;padding:2rem 1rem;overflow-y:auto}
.modal-bg.open{display:flex}
.modal-box{background:var(--surface);border-radius:18px;max-width:640px;width:100%;box-shadow:var(--shadow-lg);animation:modalIn .2s ease;margin:auto}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
.modal-img{width:100%;height:185px;object-fit:cover;border-radius:18px 18px 0 0;display:block}
.modal-body{padding:1.6rem}
.modal-close{float:right;background:var(--surface2);border:none;cursor:pointer;font-size:.78rem;padding:.26rem .56rem;border-radius:7px;color:var(--ink3);font-weight:700}
.modal-close:hover{background:var(--rose-l);color:var(--rose)}
.modal-badge{display:inline-block;padding:.14rem .48rem;border-radius:999px;font-size:.62rem;font-weight:700;margin-bottom:.5rem;background:var(--blue-l);color:var(--blue)}
.modal-title{font-family:'Fraunces',serif;font-size:1.35rem;margin-bottom:.2rem}
.modal-sub{font-size:.77rem;color:var(--ink3);margin-bottom:.82rem}
.modal-desc{font-size:.83rem;color:var(--ink2);line-height:1.75;margin-bottom:.95rem}
.subjects-grid{display:flex;gap:.33rem;flex-wrap:wrap}
.subject-tag{padding:.18rem .55rem;border-radius:7px;font-size:.69rem;font-weight:600;background:var(--surface2);color:var(--ink2);border:1px solid var(--border)}

/* ════ DETAIL ════ */
.detail-page{max-width:840px;margin:0 auto;padding:2rem 5vw 4rem}

/* ══ YAML PARSER ══ */
function parseFM(rawText){
  const text=rawText.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const m=text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if(!m)return{fm:{},body:text.trim()};
  const raw=m[1],body=m[2].trim(),fm={},lines=raw.split('\n');
  let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(!line.trim()||line.trim().startsWith('#')){i++;continue;}
    const kv=line.match(/^([\w][\w_-]*):\s*(.*)\s*$/);
    if(!kv){i++;continue;}
    const key=kv[1];let val=kv[2].trim();
    if(/^[|>][+\-]?$/.test(val)){
      const fold=val.startsWith('>'),strip=val.endsWith('-');
      i++;const bls=[];
      while(i<lines.length){
        const bl=lines[i];
        if(bl!==''&&!bl.startsWith(' ')&&!bl.startsWith('\t'))break;
        bls.push(bl.replace(/^  /,'').replace(/^\t/,''));i++;
      }
      if(strip){while(bls.length&&!bls[bls.length-1].trim())bls.pop();}
      fm[key]=fold?bls.join(' ').replace(/\s+/g,' ').trim():bls.join('\n').trim();
      continue;
    }
    if((val.startsWith('"')&&val.endsWith('"'))||(val.startsWith("'")&&val.endsWith("'")))val=val.slice(1,-1);
    fm[key]=val;i++;
  }
  return{fm,body};
}

/* Parse YAML list (roles under same org) — robust version */
function parseRolesList(rawText){
  // Normalize line endings using split/join (no regex needed)
  const txt = rawText.split('\r\n').join('\n').split('\r').join('\n');
  if(txt.indexOf('\nroles:') === -1) return [];

  const lines = txt.split('\n');
  const items = [];
  let cur = null;
  let inRoles = false;
  let listIndent = -1;

  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    if(!inRoles){
      if(line.trim() === 'roles:') inRoles = true;
      continue;
    }
    if(!line.trim()) continue;
    const indent = line.search(/\S/);
    if(indent === 0 && /^\w/.test(line)) break; // back to root
    const isDash = /^\s+-/.test(line);
    if(isDash && (listIndent === -1 || indent === listIndent)){
      if(listIndent === -1) listIndent = indent;
      if(cur && Object.keys(cur).length > 0) items.push(cur);
      cur = {};
      const inline = line.match(/^\s+-\s+([\w_]+):\s*["']?(.*?)["']?\s*$/);
      if(inline) cur[inline[1]] = inline[2].trim();
    } else if(cur !== null && indent > listIndent){
      const kv = line.match(/^\s+([\w_]+):\s*["']?(.*?)["']?\s*$/);
      if(kv) cur[kv[1]] = kv[2].trim();
    }
  }
  if(cur && Object.keys(cur).length > 0) items.push(cur);
  return items;
}

}

/* ══ GITHUB API ══ */
async function ghList(path){
  const url=`${PROXY}/repos/${REPO}/contents/${path}?ref=${BRANCH}`;
  try{
    const r=await fetch(url,GH_HEADERS);
    if(r.status===404){dbg(`${path}: not found`,'warn');return null;}
    if(!r.ok){dbg(`${path}: HTTP ${r.status}`,'err');return null;}
    const data=await r.json();
    dbg(`${path}: found ${Array.isArray(data)?data.length:0} files`,'ok');
    return Array.isArray(data)?data:null;
  }catch(e){dbg(`${path}: ${e.message}`,'err');return null;}
}
async function ghRaw(url){
  try{const r=await fetch(url);if(!r.ok)return null;return r.text();}
  catch(e){dbg(`raw: ${e.message}`,'err');return null;}
}

/* ── Parse date string to timestamp for sorting ── */
function dateToTs(str){
  if(!str)return 0;
  // Try various formats: "24 April, 2026", "April 2025", "2025", ISO etc
  const d=new Date(str);
  if(!isNaN(d.getTime()))return d.getTime();
  // Try "DD MMMM, YYYY"
  const m=str.match(/(\d{4})/);
  return m?parseInt(m[1])*1e6:0;
}
async function fetchEducation(){
  const files=await ghList('content/education');if(!files)return;
  const items=await Promise.all(files.filter(f=>f.name.endsWith('.md')).map(async f=>{

    const{fm}=parseFM(text);
    // Extract year from datetime string (e.g. "01 January, 2025" → "2025")
    const rawPassing=fm.passing||'';
    const yearMatch=rawPassing.match(/\b(\d{4})\b/);
    const passingYear=yearMatch?yearMatch[1]:rawPassing;
    return{level:fm.level||'',institution:fm.institution||'',degree:fm.degree||'',
      passing:passingYear,gpa:fm.gpa||'',icon:fm.icon||'🎓',iconBg:fm.icon_bg||'var(--blue-l)',
      logo:fixImg(fm.logo||''),     // small logo for homepage icon

      order:parseInt(fm.order||99),passingYearNum:parseInt(passingYear||0)};

}

  }));
  const v=items.filter(Boolean).sort((a,b)=>dateToTs(b.time)-dateToTs(a.time));if(v.length>0)REVIEWS_DATA=v;
}

async function fetchCategories(){

  }));
  cats.filter(Boolean).forEach(cat=>{

    if(cat.parent==='Standalone'){if(!GROUPS[cat.name])GROUPS[cat.name]={label:cat.name,subcats:[cat.name],hasDropdown:false,dynamic:true};}
    else if(GROUPS[cat.parent]&&!GROUPS[cat.parent].subcats.includes(cat.name)){
      GROUPS[cat.parent].subcats.push(cat.name);
      if(GROUPS[cat.parent].subcats.length>1)GROUPS[cat.parent].hasDropdown=true;
    }
  });
}

async function fetchSkills(){
  const files=await ghList('content/skills');if(!files)return;
  const items=await Promise.all(files.filter(f=>f.name.endsWith('.md')).map(async f=>{
    const text=await ghRaw(f.download_url);if(!text)return null;
    const{fm,body}=parseFM(text);
    // Parse proof gallery
    let proofPhotos=[];
    const lines=text.split('\n');
    let inFM=false,inProof=false,fmClosed=0;
    for(let i=0;i<lines.length;i++){
      const l=lines[i];
      if(i===0&&l.trim()==='---'){inFM=true;continue;}
      if(inFM&&l.trim()==='---'){fmClosed++;if(fmClosed>=1){inFM=false;inProof=false;break;}}
      if(!inFM)continue;
      if(l.match(/^proof_photos:\s*$/)){inProof=true;continue;}
      if(inProof){
        if(l.match(/^\s+-\s+/)){const v=l.replace(/^\s+-\s+/,'').trim().replace(/^["']|["']$/g,'');if(v)proofPhotos.push(fixImg(v));}
        else if(l.match(/^\w/)){inProof=false;}
      }
    }
    return{name:fm.name||'',category:fm.category||'Academic',
      logo:fixImg(fm.logo||''),description:fm.description||'',
      proofPhotos,body,order:parseInt(fm.order||99)};
  }));
  const v=items.filter(Boolean).sort((a,b)=>a.order-b.order);
  if(v.length>0)ALL_SKILLS=v;dbg(`skills: ${v.length} loaded`,'ok');
}

async function fetchExperiences(){
  const files=await ghList('content/experiences');if(!files)return;
  const items=await Promise.all(files.filter(f=>f.name.endsWith('.md')).map(async f=>{
    const text=await ghRaw(f.download_url);if(!text)return null;
    const{fm,body}=parseFM(text);
    // Try to parse multi-role list
    const roles=parseRolesList(text);
    if(roles.length>0){
      // Multi-role entry (promotions/continuations)
      const sortedRoles=roles.sort((a,b)=>{
        const aEnd=a.end_date||'';const bEnd=b.end_date||'';
        if(!aEnd)return-1;if(!bEnd)return 1;
        return 0;
      });
      return{
        id:f.name.replace('.md',''),
        organization:fm.organization||'',
        logo:fixImg(fm.logo||''),
        location:fm.location||'',
        roles:sortedRoles,
        isMultiRole:true,
        isCurrent:!sortedRoles[0].end_date||sortedRoles[0].end_date===''||sortedRoles[0].end_date.toLowerCase().includes('present'),
        body
      };
    }
    // Single role entry
    const endDate=fm.end_date||'';
    const isCurrent=!endDate||endDate.toLowerCase().includes('present');
    return{
      id:f.name.replace('.md',''),
      organization:fm.organization||'',
      role:fm.role||fm.title||'',
      type:fm.employment_type||'Full Time',
      startDate:fm.start_date||'',
      endDate:endDate,isCurrent,
      location:fm.location||'',
      description:fm.description||'',
      logo:fixImg(fm.logo||''),
      isMultiRole:false,body,
      showExcerpt:fm.show_excerpt==='true'||fm.show_excerpt===true
    };
  }));
  const v=items.filter(Boolean).sort((a,b)=>{
    // Current first
    const aC=a.isCurrent?1:0,bC=b.isCurrent?1:0;
    if(bC!==aC)return bC-aC;
    // Then by most recent start date
    const aStart=a.isMultiRole&&a.roles&&a.roles.length?((a.roles[a.roles.length-1]||{}).start_date||''):(a.startDate||'');
    const bStart=b.isMultiRole&&b.roles&&b.roles.length?((b.roles[b.roles.length-1]||{}).start_date||''):(b.startDate||'');
    return dateToTs(bStart)-dateToTs(aStart);
  });
  if(v.length>0){ALL_EXPERIENCES=v;dbg(`experiences: ${v.length}`,'ok');}
}

async function fetchProjects(){
  const files=await ghList('content/projects');if(!files)return[];
  const items=await Promise.all(files.filter(f=>f.name.endsWith('.md')).map(async f=>{
    const text=await ghRaw(f.download_url);if(!text)return null;
    const{fm,body}=parseFM(text);
    dbg(`project: "${fm.title||f.name}" cat="${fm.category}"`,'ok');
    // Parse gallery — Sveltia CMS saves list fields in frontmatter as:
    // gallery:\n  - /assets/images/foo.jpg\n  - /assets/images/bar.jpg
    let gallery=[];
    const lines=text.split('\n');
    let inFM=false,inGallery=false,fmClosed=0;
    for(let i=0;i<lines.length;i++){
      const l=lines[i];
      if(i===0&&l.trim()==='---'){inFM=true;continue;}
      if(inFM&&l.trim()==='---'){fmClosed++;if(fmClosed>=1){inFM=false;inGallery=false;break;}}
      if(!inFM)continue;
      if(l.match(/^gallery:\s*$/)){inGallery=true;continue;}
      if(inGallery){
        if(l.match(/^\s+-\s+/)){
          const val=l.replace(/^\s+-\s+/,'').trim().replace(/^["']|["']$/g,'');
          if(val)gallery.push(fixImg(val));
        } else if(l.match(/^\w/)||l.match(/^[^-\s]/)){inGallery=false;}
      }
    }
    const focusX=parseInt(fm.focus_x||50);
    const focusY=parseInt(fm.focus_y||30);
    return{id:f.name.replace('.md',''),title:fm.title||'Untitled',
      category:fm.custom_category||fm.category||'',
      image:fixImg(fm.image||''),gallery,focusX,focusY,
      description:fm.description||'',date:fm.date||'',
      link:fm.link||'',youtube:fm.youtube||'',body,
      pinned:fm.pinned==='true'||fm.pinned===true};
  }));
  // Sort: pinned first, then by date desc
  const sorted=items.filter(Boolean).sort((a,b)=>{
    if(b.pinned!==a.pinned)return b.pinned?1:-1;
    return dateToTs(b.date)-dateToTs(a.date);
  });
  return sorted;
}

function countCat(cat){
  if(['Full Time','Part Time','Voluntary','Internship','Research','Other'].includes(cat))
    return ALL_EXPERIENCES.filter(e=>e.isMultiRole
      ? e.roles&&e.roles.some(r=>(r.employment_type||r.type||'')===(cat))

/* ── Experience horizontal timeline ── */
function typeClass(t){
  t=(t||'').toLowerCase();
  if(t.includes('full'))return'fulltime';
  if(t.includes('volunt'))return'voluntary';
  if(t.includes('intern'))return'internship';
  if(t.includes('part'))return'parttime';
  if(t.includes('research'))return'research';
  return'fulltime';
}

function getYear(dateStr){
  if(!dateStr)return'';
  const m=(dateStr||'').match(/\b(\d{4})\b/);return m?m[1]:'';
}
function buildYearLabel(startDate, endDate, isCurrent){
  const sy=getYear(startDate||'');
  const ey=isCurrent?'':getYear(endDate||'');
  if(!sy)return'';
  if(ey&&ey!==sy)return sy+' – '+ey;
  if(isCurrent)return sy+' –';
  return sy;
}

function truncate(text,words){
  const w=(text||'').trim().split(/\s+/);
  return w.length<=words?text:w.slice(0,words).join(' ')+'…';
}
function cardHTML(p){

  return`<div class="card" onclick="location.hash='view-${p.id}'">
    ${hasImg?`<img src="${p.image}" class="card-img" alt="${p.title}" style="${focusStyle}" onerror="this.style.display='none'">`:''}

function md2html(md){if(!md)return'';return md.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/^\- (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]+?<\/li>)/g,'<ul>$1</ul>').replace(/\n\n/g,'</p><p>')+'</p>';}

let _gal={};
function renderGallery(id,imgs,fx,fy){
  if(!imgs||!imgs.length)return'';
  _gal[id]={imgs,cur:0};
  const fxp=fx||50,fyp=fy||30;
  return`<div class="gallery-wrap" id="gal-${id}">
    <div class="gallery-main">
      <img id="gal-main-${id}" src="${imgs[0]}" alt="" style="object-position:${fxp}% ${fyp}%" onerror="this.src=''">
      ${imgs.length>1?`
      <button class="gallery-main-nav gallery-prev" onclick="galMove('${id}',-1)">‹</button>
      <button class="gallery-main-nav gallery-next" onclick="galMove('${id}',1)">›</button>
      <div class="gallery-counter" id="gal-cnt-${id}">1 / ${imgs.length}</div>`:''}
    </div>
    ${imgs.length>1?`
    <div class="gallery-thumbs" id="gal-thumbs-${id}">
      ${imgs.map((src,i)=>`<img class="gallery-thumb ${i===0?'active':''}" src="${src}" onclick="galGoto('${id}',${i})" alt="">`).join('')}
    </div>`:''}
  </div>`;
}
function galMove(id,dir){
  const g=_gal[id];if(!g)return;
  galGoto(id,(g.cur+dir+g.imgs.length)%g.imgs.length);
}
function galGoto(id,idx){
  const g=_gal[id];if(!g)return;
  g.cur=idx;
  const main=document.getElementById(`gal-main-${id}`);
  const cnt=document.getElementById(`gal-cnt-${id}`);
  const thumbs=document.getElementById(`gal-thumbs-${id}`);
  if(main){main.style.opacity='0';setTimeout(()=>{main.src=g.imgs[idx];main.style.opacity='1';},180);}
  if(cnt)cnt.textContent=`${idx+1} / ${g.imgs.length}`;
  if(thumbs){
    thumbs.querySelectorAll('.gallery-thumb').forEach((t,i)=>t.classList.toggle('active',i===idx));
    const active=thumbs.querySelectorAll('.gallery-thumb')[idx];
    if(active)active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }
}

/* ── Skill popup positioning ── */
let _spTimer=null;
function showSkillPopup(chip){
  clearTimeout(_spTimer);
  const popup=chip.querySelector('.skill-popup');
  if(!popup)return;
  const rect=chip.getBoundingClientRect();
  popup.style.display='block';
  popup.style.left=(rect.left+rect.width/2-110)+'px';
  popup.style.top=(rect.top-popup.offsetHeight-10+window.scrollY)+'px';
  // If popup goes off screen top, show below
  if(rect.top-popup.offsetHeight<10){
    popup.style.top=(rect.bottom+10+window.scrollY)+'px';
    popup.style.setProperty('--arrow-top','auto');
  }
}
function hideSkillPopup(){
  _spTimer=setTimeout(()=>{
    document.querySelectorAll('.skill-popup').forEach(p=>p.style.display='none');

}

        ${data.desc?`<p class="modal-desc">${data.desc}</p>`:''}
        ${allImgs.length?renderGallery('skill-proof',allImgs,50,50):''}
      </div>`;
    document.getElementById('edu-modal').classList.add('open');
    document.body.style.overflow='hidden';
  }catch(e){console.error(e);}
}

/* ── Decimal star renderer ── */
function renderStars(rating){
  const r=Math.min(5,Math.max(0,parseFloat(rating)||0));
  const full=Math.floor(r);
  const half=(r-full)>=0.25&&(r-full)<0.75;
  const empty=5-full-(half?1:0);
  const starFull='<span style="color:#f59e0b">★</span>';
  const starHalf='<span style="color:#f59e0b;opacity:.6">★</span>';
  const starEmpty='<span style="color:#d4c5a9">★</span>';
  return starFull.repeat(full)+(half?starHalf:'')+starEmpty.repeat(empty)+
    `<span class="star-score">${r.toFixed(1)}</span>`;
}

/* ── Image compression (for CMS uploads via dashboard) ── */
function compressImage(file,maxW=1200,quality=0.82){
  return new Promise(resolve=>{
    if(!file.type.startsWith('image/')){resolve(file);return;}
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>{
          resolve(new File([blob],file.name,{type:'image/jpeg',lastModified:Date.now()}));
        },'image/jpeg',quality);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
