<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Abdullah Shadek Fahim | EEE Researcher & Professional</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f3;--surface:#fff;--surface2:#f2efe9;
  --border:#e6e1d9;--border2:#d5cfc6;
  --ink:#1a1714;--ink2:#4a453e;--ink3:#8a837a;
  --blue:#1d5aff;--blue-l:#e8eeff;--blue-m:#c5d3ff;
  --teal:#00897b;--teal-l:#e0f4f1;--teal-d:#006b5f;
  --amber:#b87000;--amber-l:#fef3e0;
  --rose:#c0335a;--rose-l:#fde8ef;
  --purple:#6c35c9;--purple-l:#f0eaff;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 4px 6px rgba(0,0,0,.05),0 16px 48px rgba(0,0,0,.14);
  --r:14px;--r-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh;overflow-x:hidden}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(248,247,243,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:58px;gap:.8rem}
.nav-logo{display:flex;align-items:center;gap:.5rem;font-family:'Fraunces',serif;font-weight:700;font-size:1.05rem;color:var(--ink);cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav-logo span{color:var(--blue)}
.nav-photo-wrap{position:relative;width:30px;height:30px;border-radius:8px;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 2px var(--blue-m)}
.nav-photo{width:100%;height:100%;object-fit:cover;display:block}
.nav-photo-wrap::after{content:'';position:absolute;top:-20%;left:-80%;width:52%;height:140%;background:linear-gradient(105deg,transparent 28%,rgba(255,255,255,.08) 44%,rgba(255,255,255,.48) 50%,rgba(255,255,255,.08) 56%,transparent 70%);transform:skewX(-12deg);animation:glassWave 4s cubic-bezier(.45,0,.55,1) infinite;pointer-events:none}
.nav-links{display:flex;gap:0;list-style:none;align-items:center;flex:1;justify-content:center}
.nav-item{position:relative}
.nav-item>a{display:flex;align-items:center;gap:.26rem;color:var(--ink3);text-decoration:none;font-size:.79rem;font-weight:500;padding:.44rem .56rem;border-radius:6px;transition:all .15s;white-space:nowrap;cursor:pointer}
.nav-item>a:hover,.nav-item:hover>a{color:var(--blue);background:var(--blue-l)}
.nav-arrow{font-size:.5rem;opacity:.5;transition:transform .15s}
.nav-item:hover .nav-arrow{transform:rotate(180deg)}
.nav-cnt{background:var(--blue);color:#fff;border-radius:999px;padding:.03rem .33rem;font-size:.56rem;font-weight:700;min-width:16px;text-align:center;display:inline-block}
.dropdown{display:none;position:absolute;top:calc(100% + 7px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;min-width:196px;box-shadow:var(--shadow-lg);padding:.3rem;z-index:300;animation:dropIn .14s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.nav-item:hover .dropdown{display:block}
.dropdown a{display:flex;align-items:center;justify-content:space-between;padding:.41rem .66rem;border-radius:7px;color:var(--ink2);text-decoration:none;font-size:.76rem;font-weight:500;transition:all .12s;cursor:pointer}
.dropdown a:hover{background:var(--blue-l);color:var(--blue)}
.dd-cnt{background:var(--blue-l);color:var(--blue);border-radius:999px;padding:.03rem .37rem;font-size:.61rem;font-weight:700}
.dropdown-div{height:1px;background:var(--border);margin:.26rem .26rem}
.nav-hire{font-size:.73rem;font-weight:700;padding:.33rem .75rem;border-radius:7px;border:none;background:var(--teal);color:#fff;cursor:pointer;transition:all .17s;text-decoration:none;white-space:nowrap;flex-shrink:0}
.nav-hire:hover{background:var(--teal-d)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;flex-shrink:0}
.hamburger span{display:block;width:22px;height:2px;background:var(--ink);border-radius:2px}

/* DRAWER */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;backdrop-filter:blur(3px)}
.drawer-overlay.open{display:block}
.side-drawer{position:fixed;top:0;right:-290px;width:275px;height:100vh;background:var(--surface);z-index:401;box-shadow:var(--shadow-lg);transition:right .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.side-drawer.open{right:0}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.1rem;border-bottom:1px solid var(--border)}
.drawer-head-logo{display:flex;align-items:center;gap:.45rem;font-family:'Fraunces',serif;font-weight:700;font-size:1rem}
.drawer-nav-photo-wrap{position:relative;width:28px;height:28px;border-radius:7px;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 2px var(--blue-m)}
.drawer-nav-photo-wrap::after{content:'';position:absolute;top:-20%;left:-80%;width:52%;height:140%;background:linear-gradient(105deg,transparent 28%,rgba(255,255,255,.08) 44%,rgba(255,255,255,.48) 50%,rgba(255,255,255,.08) 56%,transparent 70%);transform:skewX(-12deg);animation:glassWave 4s cubic-bezier(.45,0,.55,1) infinite;pointer-events:none}
.drawer-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--ink3)}
.drawer-body{padding:.4rem .5rem}
.dg-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:.56rem .76rem;border-radius:8px;background:none;border:none;font-family:inherit;font-size:.82rem;font-weight:600;color:var(--ink);cursor:pointer;transition:all .13s;text-align:left}
.dg-btn:hover{background:var(--surface2)}
.dg-right{display:flex;align-items:center;gap:.36rem;font-size:.66rem}
.drawer-sub{padding:0 .42rem .22rem 1.25rem;display:none}
.drawer-sub.open{display:block}
.drawer-sub a{display:flex;align-items:center;justify-content:space-between;padding:.37rem .55rem;border-radius:6px;font-size:.78rem;color:var(--ink2);text-decoration:none;cursor:pointer;transition:all .12s}
.drawer-sub a:hover{background:var(--blue-l);color:var(--blue)}
.drawer-divider{height:1px;background:var(--border);margin:.42rem 0}
.drawer-direct{display:flex;align-items:center;justify-content:space-between;padding:.56rem .76rem;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:500;color:var(--ink2);transition:all .12s}
.drawer-direct:hover{background:var(--blue-l);color:var(--blue)}
.drawer-hire{display:block;margin:.8rem .5rem .25rem;padding:.65rem;border-radius:8px;background:var(--teal);color:#fff;text-align:center;font-weight:700;font-size:.82rem;text-decoration:none}

/* HERO */
.hero{max-width:1100px;margin:0 auto;padding:3.5rem 5vw 2.5rem;display:grid;grid-template-columns:auto 1fr;gap:3rem;align-items:center}
.photo-wrap{position:relative;display:inline-block;border-radius:24px;box-shadow:var(--shadow-lg);overflow:hidden;flex-shrink:0}
.hero-photo{width:178px;height:178px;border-radius:24px;object-fit:cover;display:block;border:4px solid var(--surface)}
.photo-wrap::after{content:'';position:absolute;top:-20%;left:-80%;width:52%;height:140%;background:linear-gradient(105deg,transparent 28%,rgba(255,255,255,.07) 44%,rgba(255,255,255,.44) 50%,rgba(255,255,255,.07) 56%,transparent 70%);transform:skewX(-12deg);animation:glassWave 4s cubic-bezier(.45,0,.55,1) infinite;pointer-events:none}
@keyframes glassWave{0%{left:-80%}55%,100%{left:130%}}
.photo-wrap::before{content:'';position:absolute;inset:-1px;border-radius:26px;background:linear-gradient(135deg,rgba(29,90,255,.28),rgba(0,137,123,.18),transparent 60%);z-index:-1}
.hero-eyebrow{color:var(--blue);font-weight:700;font-size:.71rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem}
.hero-name{font-family:'Fraunces',serif;font-size:clamp(1.85rem,4.2vw,2.9rem);font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:.4rem}
.hero-sub{font-size:.83rem;color:var(--ink3);margin-bottom:.5rem;font-weight:500}
.hero-bio{font-size:.9rem;color:var(--ink2);max-width:530px;line-height:1.8;margin-bottom:1.2rem}
.hero-btns{display:flex;gap:.52rem;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.5rem 1rem;border-radius:var(--r-sm);font-size:.78rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;transition:all .18s;font-family:inherit}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#1449d6;transform:translateY(-1px)}
.btn-hire{background:var(--teal);color:#fff}.btn-hire:hover{background:var(--teal-d);transform:translateY(-1px)}
.btn-g{background:var(--surface);color:var(--ink2);border:1px solid var(--border2)}.btn-g:hover{border-color:var(--blue);color:var(--blue);transform:translateY(-1px)}

/* SECTIONS */
.section{max-width:1100px;margin:0 auto;padding:2.2rem 5vw}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;gap:.5rem}
.section-title{font-family:'Fraunces',serif;font-size:1.5rem}
.divider{max-width:1100px;margin:0 auto;padding:0 5vw}
.divider hr{border:none;border-top:1px solid var(--border)}

/* EDUCATION */
.edu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.95rem}
.edu-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;display:flex;gap:.85rem;align-items:flex-start;transition:all .19s;cursor:pointer}
.edu-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:var(--blue-m)}
.edu-card:hover .edu-arr{opacity:1;transform:translateX(3px)}
.edu-icon{font-size:1.4rem;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.edu-level{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:.12rem}
.edu-inst{font-size:.85rem;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:.18rem}
.edu-degree{font-size:.73rem;color:var(--ink2);margin-bottom:.4rem}
.edu-meta{display:flex;gap:.38rem;flex-wrap:wrap}
.edu-pill{padding:.13rem .46rem;border-radius:999px;font-size:.63rem;font-weight:600;background:var(--surface2);color:var(--ink3);border:1px solid var(--border)}
.edu-arr{color:var(--blue);font-size:.7rem;opacity:0;transition:all .19s;align-self:center;flex-shrink:0;margin-left:auto}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(26,23,20,.55);backdrop-filter:blur(6px);justify-content:center;align-items:flex-start;padding:2rem 1rem;overflow-y:auto}
.modal-bg.open{display:flex}
.modal-box{background:var(--surface);border-radius:18px;max-width:640px;width:100%;box-shadow:var(--shadow-lg);animation:modalIn .2s ease;margin:auto}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
.modal-img{width:100%;height:190px;object-fit:cover;border-radius:18px 18px 0 0;display:block}
.modal-body{padding:1.65rem}
.modal-close{float:right;background:var(--surface2);border:none;cursor:pointer;font-size:.8rem;padding:.27rem .58rem;border-radius:7px;color:var(--ink3);font-weight:700}
.modal-close:hover{background:var(--rose-l);color:var(--rose)}
.modal-badge{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.63rem;font-weight:700;margin-bottom:.52rem;background:var(--blue-l);color:var(--blue)}
.modal-title{font-family:'Fraunces',serif;font-size:1.4rem;margin-bottom:.22rem}
.modal-sub{font-size:.78rem;color:var(--ink3);margin-bottom:.85rem}
.modal-desc{font-size:.84rem;color:var(--ink2);line-height:1.75;margin-bottom:1rem}
.subjects-grid{display:flex;gap:.35rem;flex-wrap:wrap}
.subject-tag{padding:.19rem .58rem;border-radius:7px;font-size:.7rem;font-weight:600;background:var(--surface2);color:var(--ink2);border:1px solid var(--border)}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(282px,1fr));gap:1.05rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;cursor:pointer;transition:all .21s;display:flex;flex-direction:column;overflow:hidden}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-4px);border-color:var(--blue-m)}
.card-img{width:100%;height:130px;object-fit:cover;border-radius:8px;margin-bottom:.8rem;background:var(--surface2);display:block}
.card h3{font-size:.89rem;font-weight:700;margin-bottom:.33rem;line-height:1.35}
.card p{font-size:.76rem;color:var(--ink2);flex:1;line-height:1.6}
.card-cta{margin-top:.68rem;color:var(--blue);font-weight:700;font-size:.74rem}
.badge{display:inline-block;padding:.14rem .48rem;border-radius:999px;font-size:.62rem;font-weight:700;margin-bottom:.4rem}
.badge-Thesis,.badge-Journal,.badge-Conference{background:var(--blue-l);color:var(--blue)}
.badge-AcademicProject,.badge-FreelanceProject{background:var(--teal-l);color:var(--teal)}
.badge-FullTime,.badge-Voluntary{background:var(--amber-l);color:var(--amber)}
.badge-Certificate,.badge-Session,.badge-Award{background:var(--rose-l);color:var(--rose)}
.badge-dynamic{background:var(--purple-l);color:var(--purple)}
.see-all-row{display:flex;justify-content:center;margin-top:.95rem}
.see-all-btn{padding:.46rem 1.6rem;border-radius:999px;border:1.5px solid var(--blue-m);background:var(--blue-l);color:var(--blue);font-size:.76rem;font-weight:700;cursor:pointer;transition:all .19s}
.see-all-btn:hover{background:var(--blue);color:#fff}
.see-all-link{color:var(--blue);font-size:.76rem;font-weight:700;cursor:pointer;padding:.26rem .66rem;border-radius:6px;transition:all .14s;white-space:nowrap}
.see-all-link:hover{background:var(--blue-l)}

/* REVIEWS */
.reviews-track{display:flex;gap:1rem;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;padding:0 5vw .5rem;scroll-padding-left:5vw}
.reviews-track::-webkit-scrollbar{display:none}
.review-card{scroll-snap-align:start;flex:0 0 298px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;border-left:4px solid var(--amber);transition:box-shadow .19s}
.review-card:hover{box-shadow:var(--shadow-lg)}
.review-top{display:flex;align-items:center;gap:.65rem;margin-bottom:.78rem}
.review-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--amber-l);background:var(--surface2);flex-shrink:0}
.review-name{font-weight:700;font-size:.82rem}
.review-platform{font-size:.65rem;color:var(--ink3)}
.review-stars{color:#f59e0b;font-size:.85rem;margin-bottom:.5rem;letter-spacing:.04em}
.review-text{font-size:.78rem;color:var(--ink2);line-height:1.65;font-style:italic}
.review-time{font-size:.65rem;color:var(--ink3);margin-top:.5rem}
.slider-controls{display:flex;align-items:center;gap:.52rem;justify-content:center;margin-top:.72rem}
.slider-btn{width:33px;height:33px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;font-size:.95rem;color:var(--ink2);display:flex;align-items:center;justify-content:center;transition:all .16s}
.slider-btn:hover{border-color:var(--blue);color:var(--blue)}
.slider-dots{display:flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:all .19s;cursor:pointer}
.dot.active{background:var(--amber);width:16px;border-radius:4px}

/* DETAIL */
.detail-page{max-width:840px;margin:0 auto;padding:2rem 5vw 4rem}
.detail-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.2rem;box-shadow:var(--shadow)}
.detail-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.6rem;margin-bottom:1rem}
.detail-title{font-family:'Fraunces',serif;font-size:1.8rem;margin-bottom:.4rem}
.detail-body{line-height:1.85;color:var(--ink2);font-size:.87rem}
.detail-body h1,.detail-body h2,.detail-body h3{font-family:'Fraunces',serif;margin:1rem 0 .5rem;color:var(--ink)}
.detail-body p{margin-bottom:.76rem}
.detail-body ul,.detail-body ol{margin-left:1.25rem;margin-bottom:.76rem}
.detail-body strong{color:var(--ink)}
.yt-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:10px;margin-top:.85rem}
.yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}

/* ALL PAGE */
.filter-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.25rem}
.ftab{padding:.32rem .85rem;border-radius:999px;font-size:.73rem;font-weight:600;border:1.5px solid var(--border2);background:var(--surface);color:var(--ink3);cursor:pointer;transition:all .15s}
.ftab.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:225px}
.empty{text-align:center;padding:3rem;color:var(--ink3);background:var(--surface);border:1px dashed var(--border2);border-radius:var(--r)}

/* DEBUG PANEL */
#debug-panel{display:none;position:fixed;bottom:1rem;right:1rem;z-index:999;background:#1a1714;color:#e8f5e9;border-radius:12px;padding:1rem;max-width:320px;max-height:60vh;overflow-y:auto;font-size:.72rem;font-family:monospace;box-shadow:var(--shadow-lg)}
#debug-panel h4{color:#81c784;margin-bottom:.5rem}
#debug-panel .ok{color:#81c784}
#debug-panel .err{color:#ef9a9a}
#debug-panel .warn{color:#ffe082}
#debug-close{float:right;background:none;border:none;color:#ef9a9a;cursor:pointer;font-size:.9rem}

footer{text-align:center;padding:2.2rem;color:var(--ink3);border-top:1px solid var(--border);margin-top:3rem;font-size:.8rem}

@media(max-width:800px){
  .nav-links{display:none}.hamburger{display:flex}
  .hero{grid-template-columns:1fr;text-align:center;gap:1.7rem;padding:2rem 5vw 1.8rem}
  .photo-wrap{margin:0 auto}.hero-btns{justify-content:center}.hero-bio{margin:0 auto 1.1rem}
  .review-card{flex:0 0 82vw}
}
@media(max-width:460px){.review-card{flex:0 0 90vw}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo" id="nav-logo-btn" onclick="goHome()">
    <div class="nav-photo-wrap" id="nav-photo-wrap" style="display:none">
      <img id="nav-photo-img" class="nav-photo" src="" alt=""/>
    </div>
    A.S.<span>FAHIM</span>
  </div>
  <ul class="nav-links" id="main-nav"></ul>
  <a id="nav-fiverr-btn" href="#" target="_blank" class="nav-hire">🛒 Hire Me</a>
  <button class="hamburger" onclick="openDrawer()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="side-drawer" id="side-drawer">
  <div class="drawer-head">
    <div class="drawer-head-logo">
      <div class="drawer-nav-photo-wrap" id="drawer-photo-wrap" style="display:none">
        <img id="drawer-photo-img" style="width:100%;height:100%;object-fit:cover;display:block" src="" alt=""/>
      </div>
      A.S.<span style="color:var(--blue)">FAHIM</span>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<div id="app"></div>

<div class="modal-bg" id="edu-modal" onclick="closeEduModal(event)">
  <div class="modal-box" id="edu-modal-box"></div>
</div>

<!-- DEBUG PANEL: nav-logo তে 5 বার click করলে খুলবে -->
<div id="debug-panel">
  <button id="debug-close" onclick="document.getElementById('debug-panel').style.display='none'">✕</button>
  <h4>🔍 Debug Info</h4>
  <div id="debug-log"></div>
</div>

<footer>© 2026 Abdullah Shadek Fahim · Jashore University of Science and Technology</footer>

<script>
const REPO   = 'asfahimbd/abdullahfahim';
const BRANCH = 'main';

/* Debug logger */
let _dbgClicks = 0;
document.getElementById('nav-logo-btn').addEventListener('click', () => {
  _dbgClicks++;
  if (_dbgClicks >= 5) { document.getElementById('debug-panel').style.display='block'; _dbgClicks=0; }
  setTimeout(()=>{ if(_dbgClicks < 5) _dbgClicks=0; }, 3000);
});
function dbg(msg, type='ok') {
  const el = document.getElementById('debug-log');
  if (!el) return;
  const d = new Date(); const t = `${d.getHours()}:${d.getMinutes()}:${d.getSeconds()}`;
  el.innerHTML += `<div class="${type}">[${t}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
  console.log(`[${type.toUpperCase()}] ${msg}`);
}

/* ══════════════════════════════════════════
   ✅ ROBUST YAML PARSER
   Handles: | > |- >- |+ >+ quoted strings
══════════════════════════════════════════ */
function parseFM(rawText) {
  /* Normalize line endings */
  const text = rawText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const m = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!m) {
    dbg('parseFM: no frontmatter found', 'warn');
    return {fm:{}, body: text.trim()};
  }

  const raw = m[1];
  const body = m[2].trim();
  const fm = {};
  const lines = raw.split('\n');
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    /* Skip empty lines and comments */
    if (!line.trim() || line.trim().startsWith('#')) { i++; continue; }

    /* Match key: value */
    const kv = line.match(/^([\w][\w_-]*):\s*(.*)\s*$/);
    if (!kv) { i++; continue; }

    const key = kv[1];
    let val = kv[2].trim();

    /* Block scalar: |, >, |-, >-, |+, >+ */
    if (/^[|>][+\-]?$/.test(val)) {
      const fold = val.startsWith('>');   /* > folds newlines to spaces */
      const strip = val.endsWith('-');    /* - strips trailing newlines */
      i++;
      const blockLines = [];

      while (i < lines.length) {
        const bl = lines[i];
        /* Block ends when we hit a non-indented line that has content */
        if (bl !== '' && !bl.startsWith(' ') && !bl.startsWith('\t')) break;
        /* Remove exactly 2 spaces of indentation */
        blockLines.push(bl.replace(/^  /, '').replace(/^\t/, ''));
        i++;
      }

      /* Strip trailing empty lines if '-' modifier */
      if (strip) { while (blockLines.length && !blockLines[blockLines.length-1].trim()) blockLines.pop(); }

      fm[key] = fold
        ? blockLines.join(' ').replace(/\s+/g,' ').trim()
        : blockLines.join('\n').trim();
      continue;
    }

    /* Remove surrounding quotes */
    if ((val.startsWith('"') && val.endsWith('"')) ||
        (val.startsWith("'") && val.endsWith("'"))) {
      val = val.slice(1, -1);
    }

    fm[key] = val;
    i++;
  }

  return {fm, body};
}

function fixImg(p) {
  if (!p || p.trim() === '') return '';
  p = p.trim();
  if (p.startsWith('/assets/')) return `https://raw.githubusercontent.com/${REPO}/${BRANCH}${p}`;
  if (p.startsWith('http')) return p;
  return `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${p}`;
}

/* ══════════════════════════════════════════
   GITHUB API — with debug logging
══════════════════════════════════════════ */
const GH_HEADERS = {headers:{Accept:'application/vnd.github+json'}};

async function ghList(path) {
  const url = `https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}`;
  try {
    const r = await fetch(url, GH_HEADERS);
    if (r.status === 404) { dbg(`${path}: folder not found (no content yet)`, 'warn'); return null; }
    if (r.status === 403) { dbg(`${path}: API rate limit hit!`, 'err'); return null; }
    if (!r.ok) { dbg(`${path}: HTTP ${r.status}`, 'err'); return null; }
    const data = await r.json();
    dbg(`${path}: found ${Array.isArray(data) ? data.length : 0} files`, 'ok');
    return Array.isArray(data) ? data : null;
  } catch(e) {
    dbg(`${path}: ${e.message}`, 'err');
    return null;
  }
}

async function ghRaw(downloadUrl) {
  try {
    const r = await fetch(downloadUrl);
    if (!r.ok) { dbg(`raw fetch failed: ${r.status}`, 'err'); return null; }
    return r.text();
  } catch(e) {
    dbg(`raw fetch error: ${e.message}`, 'err');
    return null;
  }
}

async function fetchSettings() {
  try {
    const url = `https://api.github.com/repos/${REPO}/contents/content/settings/hero.md?ref=${BRANCH}`;
    const r = await fetch(url, GH_HEADERS);
    if (!r.ok) { dbg(`settings: HTTP ${r.status}`, r.status===404?'warn':'err'); return; }
    const j = await r.json();
    const text = await ghRaw(j.download_url);
    if (!text) return;

    const {fm} = parseFM(text);
    dbg(`settings parsed: name="${fm.name}" bio="${(fm.bio||'').slice(0,30)}..."`, 'ok');

    if (fm.name)     HERO.name     = fm.name;
    if (fm.tagline)  HERO.tagline  = fm.tagline;
    if (fm.bio)      HERO.bio      = fm.bio;
    if (fm.photo)    HERO.photo    = fixImg(fm.photo);
    if (fm.email)    HERO.email    = fm.email;
    if (fm.github)   HERO.github   = fm.github;
    if (fm.linkedin) HERO.linkedin = fm.linkedin;
    if (fm.fiverr)   HERO.fiverr   = fm.fiverr;

    document.getElementById('nav-fiverr-btn').href = HERO.fiverr || '#';
    if (HERO.photo) updateNavPhoto(HERO.photo);
  } catch(e) { dbg(`settings error: ${e.message}`, 'err'); }
}

async function fetchEducation() {

    const text = await ghRaw(f.download_url);
    if (!text) return null;
    const {fm} = parseFM(text);
    dbg(`edu: ${fm.institution||f.name}`, 'ok');
    return {
      level:fm.level||'', institution:fm.institution||'', degree:fm.degree||'',

async function fetchReviews() {

async function fetchCategories() {
  const files = await ghList('content/categories');
  if (!files) return;
  const cats = await Promise.all(files.filter(f=>f.name.endsWith('.md')).map(async f => {
    const text = await ghRaw(f.download_url);
    if (!text) return null;
    const {fm} = parseFM(text);
    return {name:fm.name||'', icon:fm.icon||'📌', parent:fm.parent_group||'Standalone'};
  }));
  cats.filter(Boolean).forEach(cat => {
    if (!cat.name) return;
    if (cat.parent==='Standalone') {
      if (!GROUPS[cat.name]) GROUPS[cat.name]={label:cat.name,icon:cat.icon,subcats:[cat.name],hasDropdown:false,dynamic:true};
    } else if (GROUPS[cat.parent] && !GROUPS[cat.parent].subcats.includes(cat.name)) {
      GROUPS[cat.parent].subcats.push(cat.name);
      if (GROUPS[cat.parent].subcats.length > 1) GROUPS[cat.parent].hasDropdown = true;
    }
  });
}

async function fetchProjects() {
  const files = await ghList('content/projects');
  if (!files) return [];
  const items = await Promise.all(files.filter(f=>f.name.endsWith('.md')).map(async f => {
    const text = await ghRaw(f.download_url);
    if (!text) return null;
    const {fm, body} = parseFM(text);
    dbg(`project: "${fm.title||f.name}" cat="${fm.category}"`, 'ok');

  return items.filter(Boolean);
}

function countGroup(k) { return ALL_PROJECTS.filter(p=>GROUPS[k]?.subcats.includes(p.category)).length; }

function buildNav() {

        return`<div class="drawer-direct" onclick="drawerGo('${key}',null)">${g.icon} ${g.label}${tot>0?`<span class="nav-cnt">${tot}</span>`:''}</div>`;

function route() {
  const hash = window.location.hash.replace('#','');
  if (!hash||hash==='home') renderHome(false);
  else if (hash.startsWith('view-')) renderDetail(hash.replace('view-',''));
  else if (hash.startsWith('all-')) {
    const rest=hash.slice(4);
    const key=Object.keys(GROUPS).find(k=>rest===k||rest.startsWith(k+'-'));
    if(key){const sub=rest.length>key.length?rest.slice(key.length+1).replace(/-/g,' '):null;renderAllPage(key,sub);}
    else renderHome(false);
  }
}

      ${subs.length?`<h4 style="font-size:.75rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.52rem">Subjects Studied</h4><div class="subjects-grid">${subs.map(s=>`<span class="subject-tag">${s}</span>`).join('')}</div>`:''}
    </div>`;
  document.getElementById('edu-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeEduModal(e){if(e&&e.target!==document.getElementById('edu-modal'))return;document.getElementById('edu-modal').classList.remove('open');document.body.style.overflow='';}

/* ALL PAGE */
function showAll(key,sub){const slug=sub?sub.replace(/\s+/g,'-'):'';window.location.hash=slug?`all-${key}-${slug}`:`all-${key}`;}
function renderAllPage(key,sub){
  const g=GROUPS[key];if(!g){goHome();return;}
  let items=ALL_PROJECTS.filter(p=>g.subcats.includes(p.category));
  const active=sub||'All';if(sub)items=items.filter(p=>p.category===sub);
  document.getElementById('app').innerHTML=`
  <div class="detail-page">
    <button onclick="goHome()" class="btn btn-g" style="margin-bottom:1.1rem">← Home</button>
    <h2 class="section-title" style="margin-bottom:1rem">${g.icon} ${g.label}</h2>
    ${g.hasDropdown?`<div class="filter-tabs"><button class="ftab ${active==='All'?'active':''}" onclick="showAll('${key}',null)">All (${countGroup(key)})</button>${g.subcats.map(cat=>`<button class="ftab ${active===cat?'active':''}" onclick="showAll('${key}','${cat}')">${cat} (${countCat(cat)})</button>`).join('')}</div>`:''}
    <div class="grid">${items.length===0?`<div class="empty" style="grid-column:1/-1"><div style="font-size:2rem;margin-bottom:.5rem">📂</div><p>No items yet. <a href="/admin/" style="color:var(--blue)">Add via Admin →</a></p></div>`:items.map(p=>cardHTML(p)).join('')}</div>
  </div>`;
  window.scrollTo(0,0);
}

/* DETAIL */
function md2html(md){if(!md)return'';return md.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/^\- (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]+?<\/li>)/g,'<ul>$1</ul>').replace(/\n\n/g,'</p><p>')+'</p>';}
function getYtId(url){const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);return m?m[1]:url;}

function renderDetail(id){
  const item=ALL_PROJECTS.find(p=>p.id===id);if(!item){goHome();return;}
  const gKey=Object.keys(GROUPS).find(k=>GROUPS[k].subcats.includes(item.category))||'';
  const known=['Thesis','Journal','Conference','Academic Project','Freelance Project','Full Time','Voluntary','Certificate','Session','Award'];
  const bc=known.includes(item.category)?'badge-'+item.category.replace(/\s+/g,''):'badge-dynamic';
  document.getElementById('app').innerHTML=`
  <div class="detail-page">
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.65rem">
      <button onclick="goHome()" class="btn btn-g">← Home</button>
      ${gKey?`<button onclick="showAll('${gKey}',null)" class="btn btn-g">← ${GROUPS[gKey].label}</button>`:''}
    </div>
    <div class="detail-hero">
      ${item.image?`<img src="${item.image}" style="width:100%;max-height:300px;object-fit:cover;border-radius:10px;margin-bottom:1.3rem;display:block">`:''}
      <span class="badge ${bc}">${item.category}</span>
      <h1 class="detail-title">${item.title}</h1>
      <p style="color:var(--ink2);margin-top:.4rem;font-size:.87rem">${item.description}</p>
      ${item.link?`<a href="${item.link}" target="_blank" class="btn btn-p" style="margin-top:.85rem">View Project ↗</a>`:''}
    </div>
    ${item.youtube?`<div class="detail-section"><h3 style="font-family:Fraunces,serif;margin-bottom:.4rem">📹 Video</h3><div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${getYtId(item.youtube)}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;picture-in-picture" allowfullscreen></iframe></div></div>`:''}
    ${item.body?`<div class="detail-section"><h3 style="font-family:Fraunces,serif;margin-bottom:.82rem">Details</h3><div class="detail-body">${md2html(item.body)}</div></div>`:''}
  </div>`;
  window.scrollTo(0,0);
}

function goHome(){clearInterval(revTimer);window.location.hash='';renderHome(false);}
</script>
</body>
</html>
