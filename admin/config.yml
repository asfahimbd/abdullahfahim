backend:
  name: git-gateway
  repo: asfahimbd/abdullahfahim
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

# Netlify CMS Identity প্রয়োজন — Netlify Dashboard > Identity > Enable
# তারপর: Identity > Settings > Git Gateway > Enable

collections:
  - name: "projects"
    label: "Portfolio Items"
    folder: "content/projects"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"   # ← unique filename
    fields:
      - {label: "Title",             name: "title",       widget: "string"}
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Fiverr", "Research", "Session", "Award"]
        default: "Fiverr"
      - {label: "Featured Image",    name: "image",       widget: "image", required: false}
      - {label: "Short Description", name: "description", widget: "text"}
      - {label: "Full Details",      name: "body",        widget: "markdown"}
      - {label: "External Link",     name: "link",        widget: "string", required: false}
