backend:
  name: github
  repo: asfahimbd/abdullahfahim
  branch: main
  base_url: https://oauth-proxy.asfahimbd.workers.dev

media_folder: "assets/images"
public_folder: "/assets/images"

collections:

  # ══════════════════════════════
  # 1. SITE SETTINGS
  # ══════════════════════════════
  - name: "site_settings"
    label: "⚙ Site Settings"
    files:
      - label: "Hero / Profile Info"
        name: "hero"
        file: "content/settings/hero.md"
        fields:
          - {label: "Full Name",     name: "name",     widget: "string"}
          - {label: "Tagline",       name: "tagline",  widget: "string"}
          - {label: "Bio",           name: "bio",      widget: "string"}
          - {label: "Profile Photo", name: "photo",    widget: "image"}
          - {label: "Email",         name: "email",    widget: "string"}
          - {label: "LinkedIn URL",  name: "linkedin", widget: "string", required: false}
          - {label: "GitHub URL",    name: "github",   widget: "string", required: false}
          - {label: "ORCID ID",      name: "orcid",    widget: "string", required: false,
             hint: "শুধু ID — e.g. 0000-0001-2345-6789"}
          - {label: "Fiverr URL",    name: "fiverr",   widget: "string", required: false}

  # ══════════════════════════════
  # 2. EDUCATION
  # ══════════════════════════════
  - name: "education"
    label: "🎓 Education"
    folder: "content/education"
    create: true
    slug: "{{order}}-{{slug}}"
    fields:
      - {label: "Order (1=top)", name: "order",       widget: "number", default: 1}
      - label: "Level"
        name: "level"
        widget: "select"
        options: ["University","College","School","Other"]
      - {label: "Institution",   name: "institution", widget: "string"}
      - {label: "Degree/Group",  name: "degree",      widget: "string"}
      - {label: "Passing Year",  name: "passing",     widget: "string"}
      - {label: "GPA/Result",    name: "gpa",         widget: "string"}
      - {label: "Icon (emoji)",  name: "icon",        widget: "string", default: "🎓"}
      - label: "Icon Background"
        name: "icon_bg"
        widget: "select"
        options:
          - {label: "Blue",  value: "var(--blue-l)"}
          - {label: "Teal",  value: "var(--teal-l)"}
          - {label: "Amber", value: "var(--amber-l)"}
          - {label: "Rose",  value: "var(--rose-l)"}
        default: "var(--blue-l)"
      - {label: "Institution Photo", name: "photo",       widget: "image",  required: false}
      - {label: "Description",       name: "description", widget: "string", required: false}
      - {label: "Subjects (comma separated)", name: "subjects", widget: "string", required: false}

  # ══════════════════════════════
  # 3. EXPERIENCES ← নতুন dedicated collection
  # ══════════════════════════════
  - name: "experiences"
    label: "💼 Experiences"
    folder: "content/experiences"
    create: true
    slug: "{{year}}{{month}}{{day}}-{{slug}}"
    summary: "{{role}} at {{organization}}"
    fields:
      - {label: "Organization/Company", name: "organization", widget: "string",
         hint: "e.g. IEEE JUST Student Branch"}
      - {label: "Role/Position",        name: "role",         widget: "string",
         hint: "e.g. Chairperson, Mentor, Research Assistant"}
      - label: "Employment Type"
        name: "employment_type"
        widget: "select"
        options:
          - {label: "Full Time",  value: "Full Time"}
          - {label: "Part Time",  value: "Part Time"}
          - {label: "Voluntary",  value: "Voluntary"}
          - {label: "Internship", value: "Internship"}
          - {label: "Research",   value: "Research"}
        default: "Full Time"
      - {label: "Start Date", name: "start_date", widget: "string",
         hint: "e.g. Sep 2024"}
      - {label: "End Date",   name: "end_date",   widget: "string", required: false,
         hint: "খালি রাখলে 'Present' দেখাবে"}
      - {label: "Location",   name: "location",   widget: "string", required: false,
         hint: "e.g. Jessore, Bangladesh"}
      - {label: "Short Description", name: "description", widget: "string",
         hint: "Timeline card এ দেখাবে"}
      - {label: "Organization Logo",  name: "logo",        widget: "image",  required: false}
      - {label: "Full Details",       name: "body",        widget: "markdown", required: false}

  # ══════════════════════════════
  # 4. SKILLS
  # ══════════════════════════════
  - name: "skills"
    label: "💡 Skills"
    folder: "content/skills"
    create: true
    slug: "{{slug}}"
    summary: "{{category}} — {{name}}"
    fields:
      - {label: "Skill Name", name: "name", widget: "string"}
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - {label: "Academic Skills", value: "Academic"}
          - {label: "Research Tools",  value: "Research"}
          - {label: "Freelance Tools", value: "Freelance"}
        default: "Academic"
      - {label: "Software Logo",     name: "logo",        widget: "image",  required: false,
         hint: "Transparent PNG সবচেয়ে ভালো"}
      - {label: "Short Description", name: "description", widget: "string", required: false,
         hint: "Hover করলে দেখাবে। খালি রাখলে hover কাজ করবে না।"}
      - {label: "Order",             name: "order",       widget: "number", default: 10}

  # ══════════════════════════════
  # 5. CLIENT REVIEWS
  # ══════════════════════════════
  - name: "reviews"
    label: "⭐ Client Reviews"
    folder: "content/reviews"
    create: true
    slug: "{{year}}{{month}}{{day}}-{{slug}}"
    summary: "{{stars}}★ — {{name}}"
    fields:
      - {label: "Client Name",  name: "name",     widget: "string"}
      - {label: "Client Photo", name: "photo",    widget: "image",  required: false}
      - label: "Platform"
        name: "platform"
        widget: "select"
        options: ["Fiverr","Upwork","LinkedIn","Direct","Other"]
        default: "Fiverr"
      - {label: "Stars (1-5)", name: "stars", widget: "number", min: 1, max: 5, default: 5}
      - {label: "Review Text", name: "text",  widget: "string"}
      - {label: "Date",        name: "time",  widget: "string", hint: "e.g. April 2025"}

  # ══════════════════════════════
  # 6. CUSTOM CATEGORIES
  # ══════════════════════════════
  - name: "categories"
    label: "🗂 Custom Categories"
    folder: "content/categories"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Category Name", name: "name", widget: "string"}
      - {label: "Icon (emoji)",  name: "icon", widget: "string", default: "📌"}
      - label: "Add to Group"
        name: "parent_group"
        widget: "select"
        options:
          - {label: "Research",               value: "Research"}
          - {label: "Projects",               value: "Projects"}
          - {label: "Training & Field Works", value: "Training"}
          - {label: "Standalone (own tab)",   value: "Standalone"}
        default: "Standalone"

  # ══════════════════════════════
  # 7. PORTFOLIO ITEMS
  # ══════════════════════════════
  - name: "projects"
    label: "📁 Portfolio Items"
    folder: "content/projects"
    create: true
    slug: "{{year}}{{month}}{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - {label: "📌 Undergraduate Thesis", value: "Undergraduate Thesis"}
          - {label: "📰 Journal",              value: "Journal"}
          - {label: "🎤 Conference",           value: "Conference"}
          - {label: "🎓 Academic Project",     value: "Academic Project"}
          - {label: "💼 Freelance Project",    value: "Freelance Project"}
          - {label: "🎓 Training",             value: "Training"}
          - {label: "🔬 Field Work",           value: "Field Work"}
          - {label: "📜 Certificate",          value: "Certificate"}
          - {label: "🎙 Session",              value: "Session"}
          - {label: "🏆 Award",               value: "Award"}
          - {label: "✏️ Custom (fill below)",  value: "Custom"}
        default: "Freelance Project"
      - {label: "Custom Category",  name: "custom_category", widget: "string",  required: false}
      - label: "📌 Pin to top"
        name: "pinned"
        widget: "boolean"
        default: false
        hint: "Homepage এ এই item টা সবার আগে দেখাবে (সব category তে কাজ করে)"
      - {label: "Featured Image",   name: "image",           widget: "image",   required: false}
      - {label: "Short Description",name: "description",     widget: "string"}
      - {label: "Full Details",     name: "body",            widget: "markdown"}
      - {label: "YouTube Video URL",name: "youtube",         widget: "string",  required: false}
      - {label: "External Link",    name: "link",            widget: "string",  required: false}
