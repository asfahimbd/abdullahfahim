backend:
  name: github
  repo: asfahimbd/abdullahfahim
  branch: main
  base_url: https://oauth-proxy.asfahimbd.workers.dev

media_folder: "assets/images"
public_folder: "/assets/images"

collections:

  # ══════════════════════════════
  # 1. SITE SETTINGS
  # ══════════════════════════════
  - name: "site_settings"
    label: "⚙ Site Settings"
    files:
      - label: "Hero / Profile Info"
        name: "hero"
        file: "content/settings/hero.md"
        fields:
          - {label: "Full Name",            name: "name",            widget: "string",   required: false}
          - {label: "Tagline",              name: "tagline",         widget: "string",   required: false}
          - {label: "Bio",                  name: "bio",             widget: "string",   required: false}
          - {label: "Profile Photo",        name: "photo",           widget: "image",    required: false}
          - {label: "Email",                name: "email",           widget: "string",   required: false}
          - {label: "LinkedIn URL",         name: "linkedin",        widget: "string",   required: false}
          - {label: "GitHub URL",           name: "github",          widget: "string",   required: false}
          - {label: "ORCID ID",             name: "orcid",           widget: "string",   required: false}
          - {label: "Fiverr URL",           name: "fiverr",          widget: "string",   required: false}
          - {label: "Facebook URL",         name: "facebook",        widget: "string",   required: false}
          - {label: "YouTube Channel URL",  name: "youtube_channel", widget: "string",   required: false}
          - {label: "Resume / CV (PDF)",    name: "resume",          widget: "file",     required: false,
             hint: "PDF upload করো — click করলে site এর মধ্যেই দেখা যাবে"}

  # ══════════════════════════════
  # 2. EDUCATION
  # ══════════════════════════════
  - name: "education"
    label: "🎓 Education"
    folder: "content/education"
    create: true
    slug: "{{order}}-{{slug}}"
    fields:
      - {label: "Order (1=top)",  name: "order",       widget: "number",  required: false, default: 1}
      - {label: "Level",          name: "level",       widget: "select",  required: false,
         options: ["University","College","School","Other"], default: "University"}
      - {label: "Institution",    name: "institution", widget: "string",  required: false}
      - {label: "Degree/Group",   name: "degree",      widget: "string",  required: false}
      - {label: "Passing Year",   name: "passing",     widget: "string",  required: false}
      - {label: "GPA/Result",     name: "gpa",         widget: "string",  required: false}
      - {label: "Icon (emoji)",   name: "icon",        widget: "string",  required: false, default: "🎓",
         hint: "Logo upload করলে এই emoji টা hide হয়ে যাবে"}
      - {label: "Icon Background", name: "icon_bg",    widget: "select",  required: false,
         options: [{label: "Blue", value: "var(--blue-l)"},{label: "Teal", value: "var(--teal-l)"},{label: "Amber", value: "var(--amber-l)"},{label: "Rose", value: "var(--rose-l)"}],
         default: "var(--blue-l)"}
      - {label: "Institution Logo / Photo", name: "photo", widget: "image", required: false,
         hint: "Upload করলে emoji এর বদলে logo দেখাবে। Square ratio সবচেয়ে ভালো।"}
      - {label: "Description",    name: "description", widget: "string",  required: false}
      - {label: "Subjects (comma separated)", name: "subjects", widget: "string", required: false}

  # ══════════════════════════════
  # 3. EXPERIENCES
  # ══════════════════════════════
  - name: "experiences"
    label: "💼 Experiences"
    folder: "content/experiences"
    create: true
    slug: "{{year}}{{month}}{{day}}-{{slug}}"
    summary: "{{organization}}"
    fields:
      - {label: "Organization/Company", name: "organization", widget: "string",  required: false}
      - {label: "Organization Logo",    name: "logo",         widget: "image",   required: false}
      - {label: "Location",             name: "location",     widget: "string",  required: false}
      - label: "Roles / Positions"
        name: "roles"
        widget: "list"
        required: false
        hint: "একই company তে একাধিক role — সবচেয়ে নতুনটা আগে রাখো"
        fields:
          - {label: "Role/Position",    name: "role",              widget: "string",  required: false}
          - {label: "Employment Type",  name: "employment_type",   widget: "select",  required: false,
             options: ["Full Time","Part Time","Voluntary","Internship","Research","Other"],
             default: "Full Time"}
          - {label: "Start Date",       name: "start_date",        widget: "datetime", required: false,
             format: "DD MMMM, YYYY", date_format: "DD MMMM, YYYY", time_format: false}
          - {label: "End Date",         name: "end_date",          widget: "datetime", required: false,
             format: "DD MMMM, YYYY", date_format: "DD MMMM, YYYY", time_format: false,
             hint: "খালি রাখলে 'Present' দেখাবে"}
          - {label: "Description",      name: "description",       widget: "string",  required: false}
          - {label: "Show Excerpt on Homepage?", name: "show_excerpt", widget: "boolean", required: false,
             default: false}
      - {label: "Full Details", name: "body", widget: "markdown", required: false}

  # ══════════════════════════════
  # 4. SKILLS
  # ══════════════════════════════
  - name: "skills"
    label: "💡 Skills"
    folder: "content/skills"
    create: true
    slug: "{{slug}}"
    summary: "{{category}} — {{name}}"
    fields:
      - {label: "Skill Name",        name: "name",        widget: "string",  required: false}
      - {label: "Category",          name: "category",    widget: "select",  required: false,
         options: [{label: "Academic Skills", value: "Academic"},{label: "Research Tools", value: "Research"},{label: "Freelance Tools", value: "Freelance"},{label: "Professional Skills", value: "Soft"}],
         default: "Academic"}
      - {label: "Software Logo",     name: "logo",        widget: "image",   required: false}
      - {label: "Short Description", name: "description", widget: "string",  required: false,
         hint: "Hover করলে দেখাবে। খালি রাখলে hover কাজ করবে না।"}
      - {label: "Order",             name: "order",       widget: "number",  required: false, default: 10}

  # ══════════════════════════════
  # 5. CLIENT REVIEWS
  # ══════════════════════════════
  - name: "reviews"
    label: "⭐ Client Reviews"
    folder: "content/reviews"
    create: true
    slug: "{{year}}{{month}}{{day}}-{{slug}}"
    summary: "{{stars}}★ — {{name}}"
    fields:
      - {label: "Client Name",  name: "name",     widget: "string",  required: false}
      - {label: "Client Photo", name: "photo",    widget: "image",   required: false}
      - {label: "Platform",     name: "platform", widget: "select",  required: false,
         options: ["Fiverr","Upwork","LinkedIn","Direct","Other"], default: "Fiverr"}
      - {label: "Star Rating",  name: "stars",    widget: "number",  required: false,
         value_type: "float", min: 0, max: 5, step: 0.1, default: 5,
         hint: "0–5 এর মধ্যে — e.g. 4.3, 4.7, 5.0"}
      - {label: "Country",      name: "country",  widget: "select",  required: false,
         options: [Bangladesh, USA, "United States", UK, "United Kingdom", Canada, Australia, India, Germany, France, Japan, China, "Saudi Arabia", UAE, Malaysia, Singapore, Netherlands, Sweden, Norway, Pakistan, Turkey, Italy, Spain, Brazil, "South Korea", Indonesia, Nigeria, Egypt, Qatar, Kuwait, Jordan, Bahrain, Oman, "South Africa", Kenya, Ghana]}
      - {label: "Review Text",  name: "text",     widget: "text",    required: false}
      - {label: "Date",         name: "time",     widget: "string",  required: false, hint: "e.g. April 2025"}

  # ══════════════════════════════
  # 6. CUSTOM CATEGORIES
  # ══════════════════════════════
  - name: "categories"
    label: "🗂 Custom Categories"
    folder: "content/categories"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Category Name", name: "name",         widget: "string",  required: false}
      - {label: "Icon (emoji)",  name: "icon",         widget: "string",  required: false, default: "📌"}
      - {label: "Add to Group",  name: "parent_group", widget: "select",  required: false,
         options: [{label: "Research", value: "Research"},{label: "Projects", value: "Projects"},{label: "Training & Field Works", value: "Training"},{label: "Standalone (own tab)", value: "Standalone"}],
         default: "Standalone"}

  # ══════════════════════════════
  # 7. PORTFOLIO ITEMS
  # ══════════════════════════════
  - name: "projects"
    label: "📁 Portfolio Items"
    folder: "content/projects"
    create: true
    slug: "{{year}}{{month}}{{day}}-{{slug}}"
    fields:
      - {label: "Title",          name: "title",          widget: "string",   required: false}
      - {label: "Category",       name: "category",       widget: "select",   required: false,
         options: ["Undergraduate Thesis","Journal","Conference","Academic Project","Freelance Project","Training","Field Work","Certificate","Session","Award","Custom"],
         default: "Freelance Project"}
      - {label: "Custom Category",name: "custom_category",widget: "string",   required: false}
      - {label: "📌 Pin to top",  name: "pinned",         widget: "boolean",  required: false, default: false}
      - {label: "Date",           name: "date",           widget: "datetime", required: false,
         format: "DD MMMM, YYYY", date_format: "DD MMMM, YYYY", time_format: false}

      - label: "Featured Image (Main)"
        name: "image"
        widget: "image"
        required: false
        hint: "Main image — card এ দেখাবে"

      - label: "Image Focal Point X (0–100)"
        name: "focus_x"
        widget: "number"
        required: false
        default: 50
        min: 0
        max: 100
        hint: "Card এ image কোন অবস্থান থেকে crop হবে — বাম=0, মাঝ=50, ডান=100"

      - label: "Image Focal Point Y (0–100)"
        name: "focus_y"
        widget: "number"
        required: false
        default: 30
        min: 0
        max: 100
        hint: "উপর=0, মাঝ=50, নিচ=100 — মুখের ছবির জন্য 15–30 ভালো"

      - label: "Gallery (Additional Photos)"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Detail page এ slideshow আকারে দেখাবে — প্রথম ছবির পরে এগুলো আসবে"
        field:
          label: "Photo"
          name: "photo"
          widget: "image"

      - {label: "Short Description", name: "description", widget: "string",   required: false}
      - {label: "Full Details",      name: "body",        widget: "markdown", required: false}
      - {label: "YouTube Video URL", name: "youtube",     widget: "string",   required: false}
      - {label: "External Link",     name: "link",        widget: "string",   required: false}
